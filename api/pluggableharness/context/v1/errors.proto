syntax = "proto3";

package pluggableharness.context.v1;

option go_package = "github.com/pluggableharness/agent/pkg/context/proto/v1;contextv1";

// The context provider protocol's error taxonomy.

// ContextErrorCategory classifies a context provider's failures.
// context.md §10 — smaller than the model-provider taxonomy
// (model.md §8), but a plugin MUST still classify failures rather than
// collapsing them into one generic error.
enum ContextErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  CONTEXT_ERROR_CATEGORY_UNSPECIFIED = 0;
  // A declared file/glob/source was unreadable at call time (deleted
  // mid-session, permission error). The kernel's expected reaction: drop
  // the section for this turn, log; do not fail the turn.
  CONTEXT_ERROR_CATEGORY_SOURCE_UNAVAILABLE = 1;
  // The provider's own section (or, for a compactor, its whole returned
  // chain) exceeds token_budget. The kernel's expected reaction: reject
  // per context.md §6; do not fail the turn for a non-compactor violator.
  CONTEXT_ERROR_CATEGORY_BUDGET_EXCEEDED = 2;
  // A non-compactor provider mutated a section it doesn't own (context.md
  // §5). The kernel's expected reaction: discard the entire response,
  // restore the prior chain, log the violation.
  CONTEXT_ERROR_CATEGORY_SCOPE_VIOLATION = 3;
  // A malformed request — a kernel/adapter bug. MUST NOT be retried as-is;
  // MUST be logged with the full request shape.
  CONTEXT_ERROR_CATEGORY_INVALID_REQUEST = 4;
  // Any other failure. MUST include the raw plugin error message for
  // debugging.
  CONTEXT_ERROR_CATEGORY_UNKNOWN = 5;
}

// ContextError is the structured error detail a context provider attaches
// to a failed RPC's gRPC status, per .claude/rules/grpc.md's error-taxonomy
// convention.
message ContextError {
  // Which category of failure this is.
  ContextErrorCategory category = 1;

  // Human-readable error detail, e.g. the raw plugin error message for
  // CONTEXT_ERROR_CATEGORY_UNKNOWN.
  string message = 2;

  // Whether the kernel may retry the call that produced this error.
  bool retryable = 3;
}
