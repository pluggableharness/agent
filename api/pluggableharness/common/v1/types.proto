syntax = "proto3";

// Package pluggableharness.common.v1 defines cross-cutting metadata and identity
// types shared by every plugin category's protocol. It has no RPCs of its
// own — it exists purely to be imported. See .claude/rules/proto.md for the
// versioning and typing rules this file follows; a breaking change here is
// a breaking change for every category proto that imports it, so this file
// is held to the same "no breaking changes to a released version" rule as
// everything else, with a wider blast radius.
package pluggableharness.common.v1;

option go_package = "github.com/pluggableharness/agent/pkg/common/proto/v1;commonv1";

// --- ID and timestamp conventions ---------------------------------------
//
// This file intentionally defines no wrapper types for identifiers or
// timestamps. Per .claude/rules/proto.md, IDs are typed by context: each
// message declares its own explicitly-named string field (session_id,
// trace_id, parent_session_id, ...) rather than importing a shared generic
// ID type. Every ID in this system is ULID-formatted (Crockford base32,
// lexically sortable) unless a field's own comment says otherwise.
//
// Wall-clock display time uses google.protobuf.Timestamp
// (google/protobuf/timestamp.proto) directly in whichever category proto
// needs it — this file does not wrap it. Per .claude/rules/determinism.md,
// a timestamp field is for human display only and is never an ordering
// authority: event ordering is `sequence`, assigned by the kernel at
// persist time (specifications/state-backend.md §3), and never appears on
// the wire from a plugin — plugins never generate `sequence` values.

// Category identifies which of the seven plugin categories a producer
// implements. Used wherever a message needs to refer to "a producer of any
// kind" generically — e.g. the kernel's producer registry and the
// state-backend's producers table (specifications/state-backend.md §4).
enum Category {
  // Zero value. Never valid for a real producer; its presence on the wire
  // means a caller forgot to set the field.
  CATEGORY_UNSPECIFIED = 0;
  // A model (LLM vendor) provider — specifications/model.md.
  CATEGORY_MODEL = 1;
  // A tool provider — specifications/tool.md.
  CATEGORY_TOOL = 2;
  // A context provider — specifications/context.md.
  CATEGORY_CONTEXT = 3;
  // A memory provider — specifications/memory.md.
  CATEGORY_MEMORY = 4;
  // A frontend provider — specifications/frontend.md §3.
  CATEGORY_FRONTEND = 5;
  // A widget provider — specifications/frontend.md §4.
  CATEGORY_WIDGET = 6;
  // A slashcommand provider — specifications/slashcommand/.
  CATEGORY_SLASHCOMMAND = 7;
}

// HookPoint identifies one of the eight dispatchable points in the agent
// loop (agent-loop/hook-dispatch.md; architecture.md §Hook dispatch
// semantics enumerates the nine hook-point names, of which
// context-assemble is deliberately excluded — it stays on
// ContextService.Contribute rather than the hook.v1 dispatch surface).
// Lives here rather than in hook.v1 because hook.v1 imports several
// category packages (model, tool, plan, session) for its typed payloads:
// a category package advertising `supported_hook_points` in its
// capability message could not import hook.v1 back without a cycle, and
// this file is the import-nothing leaf every package may depend on —
// the same reasoning that homes Category here. Used by hook.v1's
// HookError, the event.v1 hook-error payload, and every category's
// capability advertisement.
enum HookPoint {
  // Zero value. Never valid on the wire; its presence means a caller
  // forgot to set the field.
  HOOK_POINT_UNSPECIFIED = 0;
  // Session creation, before the first turn begins.
  HOOK_POINT_SESSION_START = 1;
  // Immediately before a model provider's StreamCompletion is called.
  HOOK_POINT_PRE_MODEL_CALL = 2;
  // Immediately after a model turn's canonical message has been
  // assembled from the completion stream.
  HOOK_POINT_POST_MODEL_RESPONSE = 3;
  // Immediately before a plan item's tool call is applied.
  HOOK_POINT_PRE_TOOL_CALL = 4;
  // Once a turn's Plan has been fully built, before plan/apply gate
  // dispatch. The kernel-privileged policy veto subscriber
  // (architecture.md §Policy — first-party, not a plugin category) always
  // runs at this point.
  HOOK_POINT_PLAN_READY = 5;
  // Immediately after a plan item's tool call has produced a terminal
  // ToolResult or ToolError.
  HOOK_POINT_POST_TOOL_CALL = 6;
  // Immediately after a turn's whole Plan has finished applying (every
  // item reached a terminal ApplyOutcome).
  HOOK_POINT_POST_APPLY = 7;
  // Session termination, once the session has reached a terminal
  // SessionStatus.
  HOOK_POINT_SESSION_END = 8;
}

// ProducerRef identifies the exact plugin build that produced something: a
// specific name, version, and source, pinned to the category it
// implements. This is the wire-level counterpart of the "supersedes"
// replay mechanism (see docs/specifications/architecture.md) — an event's
// ProducerRef is what tells a future kernel exactly which historical
// plugin version to use when re-rendering it, regardless of what is
// currently installed.
message ProducerRef {
  // The plugin's declared name, e.g. "anthropic". Unique within a
  // category, not globally — "anthropic" as a provider and "anthropic" as
  // a memory backend are different producers.
  string name = 1;

  // The plugin's exact version, semver-formatted (e.g. "1.2.3"), matching
  // the version constraint syntax used in agent.hcl's required_providers
  // block (specifications/configuration.md §5).
  string version = 2;

  // The resolved source address the plugin was installed from, e.g.
  // "github.com/agentco/anthropic-provider". Matches the address format
  // used in agent.hcl's provider {} and required_providers {} blocks.
  string source = 3;

  // Which of the seven plugin categories this producer implements.
  Category category = 4;

  // The go-plugin handshake protocol version this producer build was
  // compiled against (.claude/rules/plugin-runtime.md). A version bump
  // here always accompanies a proto package version bump (v1 -> v2) for
  // that category — it never happens independently of one.
  uint32 protocol_version = 5;
}

// ProviderRef names a plugin by category and declared name only — no
// version, no source. This is deliberately a lighter-weight reference than
// ProducerRef: it identifies "which plugin" for scoping purposes (e.g.
// agent-loop.md §7.1's RunSessionRequest.scoped_providers, resolved from a
// sub-agent profile's declared tool set), not a specific historical build
// for replay. Use ProducerRef when the exact build matters; use
// ProviderRef when only the logical identity does.
message ProviderRef {
  // Which of the seven plugin categories this reference names.
  Category category = 1;

  // The plugin's declared name, e.g. "anthropic". Unique within a category,
  // not globally — matches ProducerRef.name's uniqueness scope.
  string name = 2;
}

// CallContext identifies the session, turn, and working directory a given
// RPC call executes for. Attached to a model provider's
// StreamCompletionRequest and a tool provider's ToolCall in this protocol
// revision (forthcoming in those files) — it's what a plugin passes back
// on its own KernelCallbackService.Emit call (kernel-callbacks.md §Emit)
// for correlation, without having to separately thread session_id/turn_id
// through every call site by hand.
message CallContext {
  // The session this call executes for. ULID-formatted, per this file's
  // ID conventions above (§"ID and timestamp conventions") — the same
  // session_id a plugin passes to Emit.
  string session_id = 1;

  // The turn within that session this call executes for. ULID-formatted.
  string turn_id = 2;

  // The session's working directory at call time.
  string working_directory = 3;
}

// PromptExpansionSpec declares a static template-expansion slash
// command: never executes anything, the kernel expands `template` with
// the user's arguments and submits the result as an ordinary
// user_message, costing a model turn. Declarable directly in any
// category's own capability response (model.md §2 Capabilities, tool.md
// §2 GetSchemaResponse, context.md §2 ContextCapabilities, memory.md §3
// MemoryCapabilities, frontend.md §2 FrontendCapabilities). Lives here
// rather than in slashcommand.v1 specifically because it has zero
// dependency on that package's own vocabulary (kind/risk/concurrency,
// borrowed from tool.v1) — homing it in the import-nothing leaf avoids
// giving every embedding category's package an edge into slashcommand.v1
// merely to declare a field that never invokes anything. A
// directly-invocable slash command is a different, tool-shaped thing —
// see pluggableharness.slashcommand.v1.SlashCommandSpec.
message PromptExpansionSpec {
  // The command's name, without the leading "/". MUST be unique across
  // every prompt-expansion command declared by every provider in the
  // session — a name collision at config-load time is a hard error
  // (configuration.md §5), independent of the direct-invoke namespace
  // pluggableharness.slashcommand.v1.SlashCommandSpec.name occupies.
  string name = 1;

  // Shown in the frontend's hotkey_hints region and wherever else the
  // frontend surfaces available commands.
  string description = 2;

  // The prompt template to expand, using "{arg}"-style placeholders.
  string template = 3;
}
