syntax = "proto3";

// Package pluggableharness.slashcommand.v1 defines the slash-command
// provider plugin protocol described in specifications/slashcommand/. A
// direct-invoke slash command is a tool-shaped operation in its own
// right — this category exists so a plugin can declare and execute one
// without also being a tool provider and aliasing into one of its own
// tool operations. kind/risk/concurrency/ToolResult/ToolError/
// OutputStream are pluggableharness.tool.v1 types reused verbatim here
// (identical gating and streaming semantics — see
// slashcommand/data-types.md), not redeclared. A prompt-expansion slash
// command (never executes anything, just expands a template) is not
// this category's concern — it stays declarable directly on any other
// category's own capability response as a PromptExpansionSpec (this
// package's types.proto).
package pluggableharness.slashcommand.v1;

import "pluggableharness/slashcommand/v1/events.proto";
import "pluggableharness/slashcommand/v1/rpc_request.proto";
import "pluggableharness/slashcommand/v1/rpc_response.proto";

option go_package = "github.com/pluggableharness/agent/pkg/slashcommand/proto/v1;slashcommandv1";

// SlashCommandService is the slash-command provider plugin protocol
// described in specifications/slashcommand/protocol.md. A slashcommand
// provider plugin exposes GetCapabilities, Configure, and Invoke; it MAY
// additionally implement Render and Preview.
service SlashCommandService {
  // GetCapabilities returns the SlashCommandSpec for every command this
  // plugin exposes, per slashcommand/protocol.md#getcapabilities. MUST be
  // cheaply re-queryable and MUST NOT require a network call.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Configure decodes this provider's agent.hcl block, per
  // slashcommand/protocol.md#configure. Errors surface as a gRPC status
  // carrying a pluggableharness.tool.v1.ToolError in its structured
  // detail, per grpc.md — not an in-band field on ConfigureResponse.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Invoke executes one direct-invoke command and streams back its
  // events, per slashcommand/protocol.md#invoke. Server-streaming,
  // reusing tool/protocol.md#invoke's shape verbatim — a
  // non-incremental command MUST still implement this shape, emitting
  // exactly one terminal `result` or `error`. Cancellation is the kernel
  // closing the gRPC stream; the plugin MUST treat this as normal
  // control flow, never as an error.
  rpc Invoke(InvokeRequest) returns (stream InvokeResponse);

  // Render returns a RenderTree for a previously-emitted opaque payload,
  // per slashcommand/protocol.md#render. MAY be implemented; if absent,
  // the kernel falls back to its generic default (pretty-printed JSON
  // payload).
  rpc Render(RenderRequest) returns (RenderResponse);

  // Preview returns a dry-run, human-readable description of what
  // Invoke would do for the given call, without performing it — per
  // slashcommand/protocol.md#preview. MAY be implemented; a kernel MUST
  // tolerate its absence and fall back to showing the call's raw
  // arguments in the plan/apply gate's permission UI.
  rpc Preview(PreviewRequest) returns (PreviewResponse);

  // Describe reports this plugin build's own identity — per
  // slashcommand/protocol.md#describe and configuration/lock-file.md's
  // dev_overrides note, this is how the kernel learns a
  // dev_overrides-resolved plugin's {name, version, source, category,
  // protocol_version} when there is no lock-file entry to read it from.
  rpc Describe(DescribeRequest) returns (DescribeResponse);
}
