syntax = "proto3";

package pluggableharness.slashcommand.v1;

import "pluggableharness/common/v1/types.proto";
import "pluggableharness/config/v1/types.proto";
import "pluggableharness/render/v1/types.proto";
import "pluggableharness/slashcommand/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/slashcommand/proto/v1;slashcommandv1";

// Unary response messages for the slashcommand provider protocol's RPCs.

// GetCapabilitiesResponse is this provider's complete capability
// advertisement.
message GetCapabilitiesResponse {
  // One entry per direct-invoke command this plugin exposes.
  repeated SlashCommandSpec commands = 1;

  // This provider's agent.hcl config schema, per configuration.md §4 —
  // what fields Configure's request may be decoded from.
  pluggableharness.config.v1.ConfigSchema config_schema = 2;

  // Which of the eight dispatchable hook points (common.v1.HookPoint)
  // this provider subscribes a HookSubscriberService to, per this
  // provider's own agent.hcl hook{} blocks. Lets the kernel validate a
  // hook{} declaration at config-load time instead of discovering an
  // unsupported subscription only when that hook point first fires.
  repeated pluggableharness.common.v1.HookPoint supported_hook_points = 3;
}

// ConfigureResponse is empty on success. Errors surface as a gRPC status
// carrying a pluggableharness.tool.v1.ToolError in its detail, per
// grpc.md — not an in-band field here.
message ConfigureResponse {}

// RenderResponse wraps the rendered tree. A thin per-RPC envelope around
// RenderTree, which keeps its own rich structure independent of the RPC
// signature.
message RenderResponse {
  // The rendered tree.
  pluggableharness.render.v1.RenderTree tree = 1;
}

// PreviewResponse carries a dry-run, human-readable description of what
// Invoke(call) would do, per slashcommand/protocol.md#preview. Rendered
// into the plan/apply gate's permission UI via PlanItem.preview
// (pluggableharness.plan.v1) — that field and this response share the
// same pluggableharness.render.v1.RenderTree type by design, exactly as
// tool.v1.PreviewResponse's does for a tool call.
message PreviewResponse {
  // The dry-run preview, rendered as a RenderTree. Producing this MUST
  // NOT mutate anything and MUST be side-effect-free — the same
  // guarantee a TOOL_KIND_DATA_SOURCE operation makes, but
  // unconditionally, regardless of the call's actual
  // pluggableharness.tool.v1.ToolKind.
  pluggableharness.render.v1.RenderTree preview = 1;
}

// DescribeResponse reports this plugin build's own identity, per
// configuration/lock-file.md's dev_overrides note: a
// dev_overrides-resolved plugin has no lock-file entry for the kernel to
// read {name, version, source, category, protocol_version} from, so the
// kernel obtains it directly from the running process via this RPC
// instead.
message DescribeResponse {
  // This plugin build's identity.
  pluggableharness.common.v1.ProducerRef producer = 1;
}
