syntax = "proto3";

// Package pluggableharness.plan.v1 defines the plan/apply gate's data types
// (specifications/agent-loop.md §5.1). A Plan collects every resource call
// identified in a turn — from a tool.v1 provider or a slashcommand.v1
// provider alike, see PlanItem.producer_category — and each PlanItem is
// evaluated independently against policy (agent-loop.md §5.1: three
// resource calls against three different providers MUST receive three
// independently evaluated decisions, even if presentation batches them
// into one approval UI interaction).
package pluggableharness.plan.v1;

import "google/protobuf/struct.proto";
import "pluggableharness/common/v1/types.proto";
import "pluggableharness/render/v1/types.proto";
import "pluggableharness/tool/v1/errors.proto";
import "pluggableharness/tool/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/plan/proto/v1;planv1";

// PlanDecision is the outcome of evaluating one PlanItem against policy.
enum PlanDecision {
  // Zero value. Never valid as a deliberately-chosen decision; its
  // presence on the wire means a caller forgot to set the field. Distinct
  // from PLAN_DECISION_PENDING (below), which is the real, legitimate
  // state a freshly-constructed, not-yet-evaluated PlanItem is in —
  // .claude/rules/proto.md requires every enum's zero value to be an
  // UNSPECIFIED sentinel, so "not yet evaluated" gets its own explicit
  // value rather than overloading the zero value.
  PLAN_DECISION_UNSPECIFIED = 0;
  // The item has been constructed but not yet evaluated against policy.
  PLAN_DECISION_PENDING = 1;
  // The kernel proceeds to apply this item without further interaction
  // (agent-loop.md §5.2).
  PLAN_DECISION_ALLOW = 2;
  // The kernel MUST emit a permission-request state event and block this
  // item's apply until the frontend returns a client decision. Not a
  // meaningful outcome for a data_source or interactive call — the policy
  // engine downgrades ASK to DENY for those (agent-loop.md §5.4).
  PLAN_DECISION_ASK = 3;
  // The kernel MUST NOT execute this item, and MUST synthesize a
  // tool_result denial block so the model observes the denial in its own
  // history (agent-loop.md §5.2).
  PLAN_DECISION_DENY = 4;
}

// PlanItem is one resource (or policy-checked data_source/interactive)
// call awaiting or having received a plan/apply decision. Produced by
// either a tool.v1 provider (a ToolCall) or a slashcommand.v1 provider
// (a SlashCommandCall) — both flow through the identical plan/apply
// gate, so this message is deliberately provider-category-agnostic
// rather than tool-exclusive; `producer_category` below is what tells a
// consumer which one produced a given item.
message PlanItem {
  // This item's own id, stable within the plan.
  string id = 1;

  // The originating call's id (matches pluggableharness.content.v1
  // ToolUseBlock.id, and — depending on producer_category — either
  // pluggableharness.tool.v1 ToolCall.id or
  // pluggableharness.slashcommand.v1 SlashCommandCall.id).
  string call_id = 2;

  // The declared name of the provider plugin this call targets.
  string provider = 3;

  // The operation being called: a pluggableharness.tool.v1.ToolSchema.name
  // when producer_category == CATEGORY_TOOL, or a
  // pluggableharness.slashcommand.v1.SlashCommandSpec.name when
  // producer_category == CATEGORY_SLASHCOMMAND.
  string operation_name = 4;

  // The call's parsed arguments — the kernel's canonical representation
  // (model.md §6 / pluggableharness.schema.v1's subset governs its
  // shape). A Struct per .claude/rules/proto.md's runtime-JSON
  // carve-out.
  google.protobuf.Struct input = 5;

  // This item's current decision.
  PlanDecision decision = 6;

  // The name of the policy rule or subscriber that produced `decision`,
  // for audit (state-backend.md §4.4 plan_items.decided_by).
  string decided_by = 7;

  // --- Snapshot fields (agent-loop/plan-apply-gate.md#plan-construction-and-policy-evaluation) ---
  //
  // The four fields below are captured from the originating operation's
  // schema (ToolSchema or SlashCommandSpec, per producer_category) at
  // plan-construction time, not looked up live at display or audit
  // time. A later agent.hcl change to the provider's schema (a
  // re-classified kind/risk, an edited description) MUST NOT
  // retroactively alter a historical plan's audit record — the snapshot
  // is what a frontend renders and what state-backend.md's plan_items
  // table persists, independent of whatever the schema looks like now.

  // Snapshot of the originating operation's kind (ToolSchema.kind or
  // SlashCommandSpec.kind — the same pluggableharness.tool.v1.ToolKind
  // type either way, per tool/data-types.md#toolschema), at
  // plan-construction time.
  pluggableharness.tool.v1.ToolKind kind = 8;

  // Snapshot of the originating operation's risk (ToolSchema.risk or
  // SlashCommandSpec.risk — the same pluggableharness.tool.v1.RiskClass
  // type either way), at plan-construction time.
  pluggableharness.tool.v1.RiskClass risk = 9;

  // Snapshot of the originating operation's description, at
  // plan-construction time.
  string description = 10;

  // The provider's dry-run preview of this call's effect, when the
  // provider implements Preview (tool/protocol.md#preview or
  // slashcommand/protocol.md#preview, per producer_category). The
  // kernel calls Preview at plan-construction time for
  // TOOL_KIND_RESOURCE items whose provider implements it; absent when
  // the provider has no Preview implementation, in which case a frontend
  // falls back to rendering the raw `input` above. Pinned to
  // render.v1.RenderTree — the exact type either category's Preview
  // response carries, so this stored snapshot and the RPC's live output
  // share one wire shape (agent-loop/plan-apply-gate.md#preview-flow).
  optional pluggableharness.render.v1.RenderTree preview = 11;

  // Which category produced this item — CATEGORY_TOOL or
  // CATEGORY_SLASHCOMMAND today, though nothing about this message
  // assumes only those two will ever reach the plan/apply gate. Governs
  // which category's Invoke/Preview RPC the kernel calls at apply time
  // and how `call_id`/`operation_name` above should be interpreted.
  pluggableharness.common.v1.Category producer_category = 12;
}

// Plan collects every policy-evaluated call identified during one turn.
message Plan {
  // The turn this plan belongs to.
  string turn_id = 1;

  // The plan's items, in the order they were identified during the turn.
  repeated PlanItem items = 2;
}

// ApplyResult carries a turn's complete set of per-item apply outcomes,
// once every item in its Plan has reached a terminal ApplyOutcome, per
// agent-loop.md §5.2. Homed in plan.v1 (rather than the forthcoming
// event.v1 package that would otherwise seem the more obvious owner) so
// both pluggableharness.hook.v1's PostApplyPayload and event.v1's
// future EVENT_KIND_APPLY payload can reference this exact message
// without either importing the other — plan.v1 has no dependency on
// either, keeping the graph acyclic.
message ApplyResult {
  // The turn this apply outcome belongs to. Matches the originating
  // Plan.turn_id.
  string turn_id = 1;

  // One outcome per applied plan item, in apply order.
  repeated ApplyItem items = 2;

  // ApplyItem is one plan item's apply outcome.
  message ApplyItem {
    // The originating PlanItem.id this outcome is for. MUST be set.
    string plan_item_id = 1;

    // The originating PlanItem.call_id this outcome is for. MUST be
    // set.
    string call_id = 2;

    // How this item's apply attempt concluded. MUST be set (never
    // APPLY_OUTCOME_UNSPECIFIED).
    ApplyOutcome outcome = 3;

    // Absent for APPLY_OUTCOME_DENIED and APPLY_OUTCOME_SKIPPED —
    // neither outcome executes the underlying tool call, so neither has
    // a ToolResult/ToolError to carry.
    oneof result {
      // The call's successful result, when outcome ==
      // APPLY_OUTCOME_APPLIED.
      pluggableharness.tool.v1.ToolResult tool_result = 4;
      // The call's failed result, when outcome == APPLY_OUTCOME_FAILED.
      pluggableharness.tool.v1.ToolError tool_error = 5;
    }
  }

  // ApplyOutcome classifies how one plan item's apply attempt concluded.
  enum ApplyOutcome {
    // Zero value. Never valid for a real outcome; its presence on the
    // wire means a caller forgot to set the field.
    APPLY_OUTCOME_UNSPECIFIED = 0;
    // The item's call executed and succeeded.
    APPLY_OUTCOME_APPLIED = 1;
    // The item's call executed and failed on its own terms (a
    // ToolError).
    APPLY_OUTCOME_FAILED = 2;
    // The item was not executed: the plan/apply gate synthesized a
    // denial instead, per agent-loop.md §5.2's tool_result denial block
    // (kernel policy PLAN_DECISION_DENY, or a HOOK_DECISION_DENY veto
    // at plan-ready). The model observes this denial in its own
    // history via the synthesized ToolResultBlock, not via this
    // ApplyItem.
    APPLY_OUTCOME_DENIED = 3;
    // The item was never reached because an earlier item in the same
    // apply pass aborted the whole apply. Not reached in the current
    // apply algorithm — reserved for a future partial-apply-then-abort
    // mode.
    APPLY_OUTCOME_SKIPPED = 4;
  }
}
