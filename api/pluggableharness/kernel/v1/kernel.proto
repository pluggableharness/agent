syntax = "proto3";

// Package pluggableharness.kernel.v1 defines the kernel-callback service described
// in specifications/kernel-callbacks.md (RunSession, CountTokens, Emit,
// Log) — the plugin-to-kernel calling direction every plugin category gets
// at handshake, the reverse of every other category's protocol in this
// series. Unlike a category plugin protocol, this service carries no
// GetCapabilities/Configure RPCs: it isn't something the kernel dials into
// a plugin, it's the connection every plugin subprocess is handed back to
// call into the kernel.
package pluggableharness.kernel.v1;

import "pluggableharness/common/v1/types.proto";
import "pluggableharness/content/v1/types.proto";
import "pluggableharness/log/v1/types.proto";
import "pluggableharness/model/v1/model.proto";
import "pluggableharness/session/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/kernel/proto/v1;kernelv1";

// KernelCallbackService is the plugin-to-kernel callback channel described
// in specifications/kernel-callbacks.md §1. hashicorp/go-plugin natively
// supports bidirectional plugins, and this is that mechanism: every plugin
// subprocess, for every category defined across this series, MUST be given
// a client connection to this service at handshake time, unconditionally.
// A plugin that never calls back simply never uses it, but the channel's
// presence is not gated on category — a context provider needing
// CountTokens is just as valid a caller as a tool provider needing
// RunSession.
service KernelCallbackService {
  // RunSession dispatches a nested sub-agent session under a named
  // agent.hcl profile. Full semantics — profile resolution, budget
  // inheritance, visibility of intermediate turns — are defined in
  // agent-loop.md §7 and are not repeated here; kernel-callbacks.md §1
  // gives this RPC's calling contract.
  //
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Response type is "RunSessionResult", the exact name agent-loop.md §7.1
  // uses in its own data-type definition. Not a uniqueness violation:
  // RunSessionResult is used by exactly this one RPC.
  rpc RunSession(RunSessionRequest) returns (RunSessionResult);

  // CountTokens resolves the token-counting gap independently flagged by
  // context.md §12, configuration.md §12, memory.md §13, and frontend.md
  // §10: exactly one kernel-owned implementation, so that `tokens` figures
  // produced by different providers stay mutually comparable and additive
  // for configuration.md §6's budget-sum arithmetic. See
  // kernel-callbacks.md §2 for the resolution algorithm and §3 for the
  // single documented fallback formula.
  //
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Response type is "CountTokensResult", the exact name kernel-callbacks.md
  // §2 uses. Not a uniqueness violation: used by exactly this one RPC.
  rpc CountTokens(CountTokensRequest) returns (CountTokensResult);

  // Emit is how a plugin persists anything into the session's state
  // backend. The kernel is the state backend's sole writer
  // (state-backend.md §3) — a plugin never opens or writes the sqlite file
  // directly; it calls Emit and the kernel performs the actual write,
  // assigning the ordering-authoritative sequence number and the stable
  // event id itself. See kernel-callbacks.md §4.
  //
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Response type is "EmitResult", the exact name kernel-callbacks.md §4
  // uses. Not a uniqueness violation: used by exactly this one RPC.
  rpc Emit(EmitRequest) returns (EmitResult);

  // Log carries a plugin's own log output into the kernel's centralized
  // logging, so it doesn't vanish into an unread subprocess stderr.
  // Unlike Emit, a Log call is not tied to an active session — a plugin
  // MAY call Log before any session exists (process startup, or from
  // within Configure) or after one has ended (during shutdown). See
  // kernel-callbacks.md §5.
  //
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Response type is "LogResult", the exact name kernel-callbacks.md §5
  // uses. Not a uniqueness violation: used by exactly this one RPC.
  rpc Log(LogRequest) returns (LogResult);
}

// RunSessionRequest names the sub-agent profile to dispatch and carries
// the inherited, only-shrinking resource budgets the child session is
// bound by. See agent-loop.md §7.
message RunSessionRequest {
  // Named sub-agent profile from agent.hcl to run this session under.
  // MUST be set.
  string profile = 1;

  // The prompt to run the sub-agent session with.
  string prompt = 2;

  // The calling session's id. MUST be set to the id of the session making
  // this RunSession call, establishing the parent/child relationship the
  // state backend and replay model rely on.
  string parent_session_id = 3;

  // Remaining sub-agent nesting depth available to the child session.
  // MUST be set. An inherited, only-shrinking budget computed by the
  // kernel per configuration.md §8.4 / agent-loop.md §7.5 — the child is
  // never able to widen it, only spend down what it was given.
  int32 remaining_depth = 4;

  // Remaining cost budget, in USD, available to the child session. MUST
  // be set. Same inherited, only-shrinking shape as remaining_depth,
  // computed per agent-loop.md §3.1.
  double remaining_cost_budget_usd = 5;

  // The set of providers the child session is scoped to, resolved from
  // the named profile's declared tool set. A caller MAY narrow this
  // further per-call but MUST NOT widen it beyond what the profile
  // declares.
  repeated pluggableharness.common.v1.ProviderRef scoped_providers = 6;
}

// RunSessionResult carries the child session's outcome back to the
// calling plugin once the child has reached a terminal state.
message RunSessionResult {
  // The id of the child session that was created and run.
  string session_id = 1;

  // The child session's final message — the only thing that crosses the
  // session boundary back to the parent turn. Intermediate turns
  // produced by the child are never visible to the parent's model
  // context (agent-loop.md §7.2), though they remain queryable in the
  // state backend for replay and audit.
  pluggableharness.content.v1.Message final_message = 2;

  // The child session's terminal lifecycle status. Never
  // SESSION_STATUS_RUNNING — a RunSession call only returns once the
  // child session has reached a terminal state.
  pluggableharness.session.v1.SessionStatus status = 3;

  // The child session's aggregate cost, in USD, summed across every turn
  // it ran, including any of its own descendant sub-agent sessions. MUST
  // be set. Deliberately a flat field, not a
  // pluggableharness.model.v1.Usage-shaped reference — this is a
  // whole-session rollup (state-backend.md's cost_ledger SUM, per
  // .claude/rules/determinism.md's "Cost and budget rollup"), a different
  // shape from one completion call's per-call Usage. Lets an orchestrator
  // plugin do budget-aware fan-out (spend-check a child's outcome before
  // deciding whether to spawn another) without needing to separately sum
  // the child's own event history itself.
  double total_cost_usd = 4;

  // The child session's aggregate input token count, summed across every
  // turn it ran, including descendants. MUST be set. Same flat,
  // aggregate-not-per-call rationale as total_cost_usd.
  int64 total_input_tokens = 5;

  // The child session's aggregate output token count, summed across
  // every turn it ran, including descendants. MUST be set. Same flat,
  // aggregate-not-per-call rationale as total_cost_usd.
  int64 total_output_tokens = 6;
}

// CountTokensRequest asks the kernel to count tokens for a block of
// content, optionally against a specific model's tokenizer. See
// kernel-callbacks.md §2.
message CountTokensRequest {
  // The content to count. MUST be set. Text-only in v1, matching the
  // content-type constraint context.md and memory.md already impose.
  repeated pluggableharness.content.v1.ContentBlock content = 1;

  // The model whose tokenizer should be preferred, if that model
  // provider implements the optional CountTokens RPC (model.md §2.1).
  // MAY be omitted, in which case the kernel's fallback heuristic
  // (kernel-callbacks.md §3) is used.
  optional pluggableharness.model.v1.ModelRef model_ref = 2;
}

// CountTokensResult carries the resolved token count and whether it came
// from a real vendor tokenizer or the kernel's fallback heuristic.
message CountTokensResult {
  // The resolved token count.
  int64 count = 1;

  // MUST be set. True if a real vendor tokenizer produced this count
  // (that model provider's own optional CountTokens RPC); false if the
  // kernel's single documented fallback heuristic did
  // (kernel-callbacks.md §3: ceil(total_utf8_byte_length(text)/4)).
  bool exact = 2;
}

// EventKind identifies the shape of an EmitRequest's opaque payload. This
// is state-backend.md §5's authoritative kind enum, restated here only
// because it is the wire-level type Emit actually carries —
// state-backend.md §5 remains authoritative if the two ever need
// reconciling again. Usage/cost figures, Render() output, and
// session_start/session_end deliberately do NOT get their own EventKind;
// see state-backend.md §5 for why.
enum EventKind {
  // Zero value. Never valid on the wire; its presence means a caller
  // forgot to set the field.
  EVENT_KIND_UNSPECIFIED = 0;

  // A completed model turn's canonical message (model.md §5). Usage
  // and cost figures live inside this payload, not as separate fields or
  // a separate EventKind (state-backend.md §5).
  EVENT_KIND_MESSAGE = 1;

  // A tool invocation's call.
  EVENT_KIND_TOOL_CALL = 2;

  // A tool invocation's result.
  EVENT_KIND_TOOL_RESULT = 3;

  // A built Plan, prior to plan-ready dispatch.
  EVENT_KIND_PLAN = 4;

  // The outcome of applying a Plan.
  EVENT_KIND_APPLY = 5;

  // A context provider's Contribute output, or a memory provider's
  // Recall output after kernel translation (memory.md §6).
  EVENT_KIND_CONTEXT_CONTRIBUTION = 6;

  // A memory provider's write of a new record.
  EVENT_KIND_MEMORY_WRITE = 7;

  // A memory provider's update of an existing record.
  EVENT_KIND_MEMORY_UPDATE = 8;

  // A memory provider's deletion of an existing record.
  EVENT_KIND_MEMORY_DELETE = 9;

  // Kernel-synthesized when a transform or veto hook subscriber fails
  // (agent-loop/hook-dispatch.md#subscriber-error-handling) — never
  // emitted by a plugin's own Emit call, only by the kernel itself
  // dispatching a hook. Payload shape is
  // pluggableharness.hook.v1.HookError, wrapped by the forthcoming
  // event.v1 package's HookErrorEvent (state-backend.md §5).
  EVENT_KIND_HOOK_ERROR = 10;
}

// EmitRequest asks the kernel to persist one event into the calling
// session's state backend. See kernel-callbacks.md §4.
message EmitRequest {
  // The calling session's id. MUST be set. The kernel MUST reject an
  // Emit naming any session other than the one the calling plugin was
  // actually invoked for.
  string session_id = 1;

  // The kind of event being emitted. MUST be set.
  EventKind kind = 2;

  // Versions the shape of `payload`, so a future kernel can still
  // interpret an old event correctly — the "supersedes" mechanism
  // described in docs/specifications/architecture.md. MUST be set.
  string schema_version = 3;

  // The event payload. MUST be set. Opaque to the kernel by design
  // (state-backend.md §4.1: "kernel never inspects this"); its structure
  // is defined by whichever spec owns this EventKind. This is the one
  // deliberate opaque-bytes carve-out in this file — every other field
  // here is strongly typed.
  bytes payload = 4;

  // Note: producer_category/producer_name/producer_version
  // (state-backend.md §4.1's other envelope fields) are deliberately NOT
  // fields on this message. The kernel already knows which plugin is
  // calling — a property of the already-authenticated callback
  // connection established at handshake — and fills them in
  // server-side. A plugin cannot declare a producer identity other than
  // its own; there is no field here to spoof.
}

// EmitResult carries the identifiers the kernel assigned to a persisted
// event.
message EmitResult {
  // The assigned, storage-independent event id.
  string id = 1;

  // The assigned, ordering-authoritative sequence number.
  int64 sequence = 2;
}

// LogRequest carries one structured log entry from a plugin to the
// kernel. See kernel-callbacks.md §5.
message LogRequest {
  // The session this log entry is attributable to. MAY be omitted —
  // unlike EmitRequest.session_id, this is not mandatory, since logging
  // can legitimately happen outside any session context (plugin startup,
  // Configure-time, shutdown).
  optional string session_id = 1;

  // The log entry itself. MUST be set.
  pluggableharness.log.v1.LogEntry entry = 2;

  // Note: producer_category/producer_name/producer_version are
  // deliberately NOT fields on this message, for the same reason
  // EmitRequest omits them — the kernel derives producer identity
  // server-side from the already-authenticated callback connection
  // established at handshake. There is no field here to spoof.
}

// LogResult is empty: a Log call either succeeds or the RPC itself
// returns a gRPC error status. There is nothing else to report back.
message LogResult {}
