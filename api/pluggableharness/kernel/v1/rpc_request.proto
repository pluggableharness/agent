syntax = "proto3";

package pluggableharness.kernel.v1;

import "pluggableharness/common/v1/types.proto";
import "pluggableharness/content/v1/types.proto";
import "pluggableharness/kernel/v1/types.proto";
import "pluggableharness/log/v1/types.proto";
import "pluggableharness/model/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/kernel/proto/v1;kernelv1";

// Request messages for every KernelCallbackService RPC.

// RunSessionRequest names the sub-agent profile to dispatch and carries
// the inherited, only-shrinking resource budgets the child session is
// bound by. See agent-loop.md §7.
message RunSessionRequest {
  // Named sub-agent profile from agent.hcl to run this session under.
  // MUST be set.
  string profile = 1;

  // The prompt to run the sub-agent session with.
  string prompt = 2;

  // The calling session's id. MUST be set to the id of the session making
  // this RunSession call, establishing the parent/child relationship the
  // state backend and replay model rely on.
  string parent_session_id = 3;

  // Remaining sub-agent nesting depth available to the child session.
  // MUST be set. An inherited, only-shrinking budget computed by the
  // kernel per configuration.md §8.4 / agent-loop.md §7.5 — the child is
  // never able to widen it, only spend down what it was given.
  int32 remaining_depth = 4;

  // Remaining cost budget, in USD, available to the child session. MUST
  // be set. Same inherited, only-shrinking shape as remaining_depth,
  // computed per agent-loop.md §3.1.
  double remaining_cost_budget_usd = 5;

  // The set of providers the child session is scoped to, resolved from
  // the named profile's declared tool set. A caller MAY narrow this
  // further per-call but MUST NOT widen it beyond what the profile
  // declares.
  repeated pluggableharness.common.v1.ProviderRef scoped_providers = 6;
}

// CountTokensRequest asks the kernel to count tokens for a block of
// content, optionally against a specific model's tokenizer. See
// kernel-callbacks.md §2.
message CountTokensRequest {
  // The content to count. MUST be set. Text-only in v1, matching the
  // content-type constraint context.md and memory.md already impose.
  repeated pluggableharness.content.v1.ContentBlock content = 1;

  // The model whose tokenizer should be preferred, if that model
  // provider implements the optional CountTokens RPC (model.md §2.1).
  // MAY be omitted, in which case the kernel's fallback heuristic
  // (kernel-callbacks.md §3) is used.
  optional pluggableharness.model.v1.ModelRef model_ref = 2;
}

// EmitRequest asks the kernel to persist one event into the calling
// session's state backend. See kernel-callbacks.md §4.
message EmitRequest {
  // The calling session's id. MUST be set. The kernel MUST reject an
  // Emit naming any session other than the one the calling plugin was
  // actually invoked for.
  string session_id = 1;

  // The kind of event being emitted. MUST be set.
  EventKind kind = 2;

  // Versions the shape of `payload`, so a future kernel can still
  // interpret an old event correctly — the "supersedes" mechanism
  // described in docs/specifications/architecture.md. MUST be set.
  string schema_version = 3;

  // The event payload. MUST be set. Opaque to the kernel by design
  // (state-backend.md §4.1: "kernel never inspects this"); its structure
  // is defined by whichever spec owns this EventKind. This is the one
  // deliberate opaque-bytes carve-out in this file — every other field
  // here is strongly typed.
  bytes payload = 4;

  // Note: producer_category/producer_name/producer_version
  // (state-backend.md §4.1's other envelope fields) are deliberately NOT
  // fields on this message. The kernel already knows which plugin is
  // calling — a property of the already-authenticated callback
  // connection established at handshake — and fills them in
  // server-side. A plugin cannot declare a producer identity other than
  // its own; there is no field here to spoof.
}

// LogRequest carries one structured log entry from a plugin to the
// kernel. See kernel-callbacks.md §5.
message LogRequest {
  // The session this log entry is attributable to. MAY be omitted —
  // unlike EmitRequest.session_id, this is not mandatory, since logging
  // can legitimately happen outside any session context (plugin startup,
  // Configure-time, shutdown).
  optional string session_id = 1;

  // The log entry itself. MUST be set.
  pluggableharness.log.v1.LogEntry entry = 2;

  // Note: producer_category/producer_name/producer_version are
  // deliberately NOT fields on this message, for the same reason
  // EmitRequest omits them — the kernel derives producer identity
  // server-side from the already-authenticated callback connection
  // established at handshake. There is no field here to spoof.
}
