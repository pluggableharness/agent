syntax = "proto3";

package pluggableharness.kernel.v1;

import "pluggableharness/common/v1/types.proto";
import "pluggableharness/content/v1/types.proto";
import "pluggableharness/kernel/v1/types.proto";
import "pluggableharness/log/v1/types.proto";
import "pluggableharness/metric/v1/types.proto";
import "pluggableharness/model/v1/types.proto";
import "pluggableharness/trace/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/kernel/proto/v1;kernelv1";

// Request messages for every KernelCallbackService RPC.

// RunSessionRequest names the sub-agent profile to dispatch and carries
// the inherited, only-shrinking resource budgets the child session is
// bound by. See agent-loop.md §7.
message RunSessionRequest {
  // Named sub-agent profile from agent.hcl to run this session under.
  // MUST be set.
  string profile = 1;

  // The prompt to run the sub-agent session with.
  string prompt = 2;

  // The calling session's id. MUST be set to the id of the session making
  // this RunSession call, establishing the parent/child relationship the
  // state backend and replay model rely on.
  string parent_session_id = 3;

  // Remaining sub-agent nesting depth available to the child session.
  // MUST be set. An inherited, only-shrinking budget computed by the
  // kernel per configuration.md §8.4 / agent-loop.md §7.5 — the child is
  // never able to widen it, only spend down what it was given.
  int32 remaining_depth = 4;

  // Remaining cost budget, in USD, available to the child session. MUST
  // be set. Same inherited, only-shrinking shape as remaining_depth,
  // computed per agent-loop.md §3.1.
  double remaining_cost_budget_usd = 5;

  // The set of providers the child session is scoped to, resolved from
  // the named profile's declared tool set. A caller MAY narrow this
  // further per-call but MUST NOT widen it beyond what the profile
  // declares.
  repeated pluggableharness.common.v1.ProviderRef scoped_providers = 6;
}

// CountTokensRequest asks the kernel to count tokens for a block of
// content, optionally against a specific model's tokenizer. See
// kernel-callbacks.md §2.
message CountTokensRequest {
  // The content to count. MUST be set. Text-only in v1, matching the
  // content-type constraint context.md and memory.md already impose.
  repeated pluggableharness.content.v1.ContentBlock content = 1;

  // The model whose tokenizer should be preferred, if that model
  // provider implements the optional CountTokens RPC (model.md §2.1).
  // MAY be omitted, in which case the kernel's fallback heuristic
  // (kernel-callbacks.md §3) is used.
  optional pluggableharness.model.v1.ModelRef model_ref = 2;
}

// EmitRequest asks the kernel to persist one event into the calling
// session's state backend. See kernel-callbacks.md §4.
message EmitRequest {
  // The calling session's id. MUST be set. The kernel MUST reject an
  // Emit naming any session other than the one the calling plugin was
  // actually invoked for.
  string session_id = 1;

  // The kind of event being emitted. MUST be set.
  EventKind kind = 2;

  // Versions the shape of `payload`, so a future kernel can still
  // interpret an old event correctly — the "supersedes" mechanism
  // described in docs/specifications/architecture.md. MUST be set.
  string schema_version = 3;

  // The event payload. MUST be set. Opaque to the kernel by design
  // (state-backend.md §4.1: "kernel never inspects this"); its structure
  // is defined by whichever spec owns this EventKind. One of two
  // deliberate opaque-bytes carve-outs in this file — see PublishRequest
  // below for the other — every other field in either message is
  // strongly typed.
  bytes payload = 4;

  // Note: producer_category/producer_name/producer_version
  // (state-backend.md §4.1's other envelope fields) are deliberately NOT
  // fields on this message. The kernel already knows which plugin is
  // calling — a property of the already-authenticated callback
  // connection established at handshake — and fills them in
  // server-side. A plugin cannot declare a producer identity other than
  // its own; there is no field here to spoof.
}

// LogRequest carries a batch of structured log entries from a plugin to
// the kernel. See kernel-callbacks.md §5. Batched rather than one entry
// per call: a plugin logging at TRACE would otherwise pay one unary
// round-trip per line.
message LogRequest {
  // The session this log entry is attributable to. MAY be omitted —
  // unlike EmitRequest.session_id, this is not mandatory, since logging
  // can legitimately happen outside any session context (plugin startup,
  // Configure-time, shutdown).
  optional string session_id = 1;

  reserved 2;
  reserved "entry";

  // The batch of log entries, in the order the plugin produced them.
  // MUST be non-empty. A malformed entry within an otherwise-valid batch
  // is skipped and warned about individually, not treated as failing the
  // whole call — see kernel-callbacks.md §5.
  repeated pluggableharness.log.v1.LogEntry entries = 3;

  // Note: producer_category/producer_name/producer_version are
  // deliberately NOT fields on this message, for the same reason
  // EmitRequest omits them — the kernel derives producer identity
  // server-side from the already-authenticated callback connection
  // established at handshake. There is no field here to spoof.
}

// ExportSpansRequest relays a batch of a plugin's own completed trace
// spans to the kernel for forwarding to the operator's configured
// collector. See kernel-callbacks.md's ExportSpans and
// observability.md#the-relay-model.
message ExportSpansRequest {
  // The session this batch is attributable to, when any. MAY be
  // omitted — same session-optional rule as LogRequest.session_id, since
  // a plugin may produce spans outside any session context.
  optional string session_id = 1;

  // The batch of completed spans. MUST be non-empty. The kernel MUST NOT
  // alter any span's identity or timing fields before relaying it.
  repeated pluggableharness.trace.v1.Span spans = 2;
}

// RecordMetricsRequest relays a batch of metric observations. See
// kernel-callbacks.md's RecordMetrics and
// observability.md#the-tracing-metrics-asymmetry for why this is not a
// transparent relay the way ExportSpansRequest is.
message RecordMetricsRequest {
  // The session this batch is attributable to, when any. MAY be
  // omitted — same rule as LogRequest.session_id.
  optional string session_id = 1;

  // The batch of metric observations. MUST be non-empty.
  repeated pluggableharness.metric.v1.MetricRecord metrics = 2;
}

// GetTelemetryConfigRequest asks the kernel whether tracing/metrics/logs
// are enabled and at what level/ratio. See kernel-callbacks.md's
// GetTelemetryConfig. Empty: the caller's identity comes from the
// callback connection, never a request field.
message GetTelemetryConfigRequest {}

// GetConfigRequest asks the kernel for the calling plugin's own resolved
// agent.hcl configuration. See kernel-callbacks.md's GetConfig. Empty:
// the caller's identity comes from the callback connection, never a
// request field.
message GetConfigRequest {}

// PublishRequest emits one event onto the event bus. See
// kernel-callbacks.md's Publish and event-bus.md.
message PublishRequest {
  // A single dot-free, wildcard-free segment naming this occurrence
  // within the plugin's own namespace, e.g. "file_changed". MUST be set.
  // The kernel MUST reject a value containing "." or "*".
  string event_type = 1;

  // The event payload. MAY be empty. Opaque to the kernel by design —
  // the second of two deliberate opaque-bytes carve-outs in this
  // package (see EmitRequest.payload above); a third-party plugin's own
  // event shape can't be named by this proto ahead of time.
  bytes payload = 2;

  // Identifies payload's shape for a subscriber: a fully-qualified proto
  // message name (preferred) or a media type. MUST be set.
  string payload_type = 3;

  // Versions payload_type the same way EmitRequest.schema_version
  // versions Emit's payload. MUST be set.
  string schema_version = 4;

  // Note: no topic field exists here on purpose — the kernel constructs
  // the fully-resolved topic ("plugin.{category}.{name}.{event_type}")
  // from the authenticated callback connection's producer identity, the
  // same anti-spoof rule EmitRequest/LogRequest already apply. See
  // event-bus.md#topic-grammar.
}

// SubscribeRequest opens a server-streaming subscription to the event
// bus. See kernel-callbacks.md's Subscribe and event-bus.md#filter-grammar.
message SubscribeRequest {
  // The topics to receive events for. MUST be non-empty. Each entry is
  // either an exact topic or a topic prefix ending in "*"
  // (event-bus.md#filter-grammar). No other wildcard form is valid in
  // v1.
  repeated string topic_filters = 1;
}

// ReadEventsRequest asks the kernel to read back the calling plugin's own
// session's persisted event log, ordered by sequence. See
// kernel-callbacks.md's ReadEvents.
message ReadEventsRequest {
  // The calling session's id. MUST be set. Same one-session-only rule as
  // EmitRequest.session_id — the kernel MUST reject a call naming any
  // other session.
  string session_id = 1;

  // Restricts the stream to these kinds. MAY be empty, meaning every
  // kind.
  repeated EventKind kinds = 2;

  // Resume point: only events with sequence >= this value are streamed.
  // MAY be omitted, meaning from the start of the session's log.
  optional int64 from_sequence = 3;

  // Caps the number of events streamed. MAY be omitted, meaning no
  // limit.
  optional int32 limit = 4;
}

// GetSessionRequest asks the kernel for the calling plugin's own
// session's metadata and live budget rollups. See kernel-callbacks.md's
// GetSession.
message GetSessionRequest {
  // The calling session's id. MUST be set. Same one-session-only rule as
  // EmitRequest.session_id.
  string session_id = 1;
}
