syntax = "proto3";

// Package pluggableharness.widget.v1 defines the widget provider plugin protocol
// described in specifications/frontend.md §4 (Attach, action dispatch, ...).
// Messages and RPCs are added incrementally as the protocol is finalized;
// this file currently scaffolds the buf toolchain wiring — see
// .claude/rules/proto.md.
package pluggableharness.widget.v1;

import "google/protobuf/struct.proto";
import "pluggableharness/common/v1/common.proto";
import "pluggableharness/config/v1/config.proto";
import "pluggableharness/render/v1/render.proto";

option go_package = "github.com/pluggableharness/agent/pkg/widget/proto/v1;widgetv1";

// WidgetService is the widget provider plugin protocol described in
// specifications/frontend.md §4.1. A widget provider plugin exposes
// GetCapabilities, Configure, and Attach. Unlike the frontend provider's
// bidirectional Attach (frontend.md §3), this Attach is server-streaming
// only — widgets are passive/display-only in v1; a widget wanting to
// trigger an action does so by also being a tool provider with a slash
// command (frontend.md §5), not through this channel.
service WidgetService {
  // GetCapabilities returns this widget's regions and config schema, per
  // frontend.md §4.1. MUST be cheaply re-queryable and MUST NOT require a
  // network call.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Configure decodes this provider's agent.hcl block, per frontend.md
  // §4.1. The request is already-decoded JSON (the schema-to-cty bridge is
  // kernel-internal and never crosses the wire). Errors surface as a gRPC
  // status per grpc.md — not an in-band field on ConfigureResponse.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Attach opens a server-streaming feed of this widget's rendered updates
  // for one session, per frontend.md §4.1 — confirmed NOT bidi; widgets are
  // passive/display-only in v1. A widget derives its displayed state via
  // observe-mode hook subscription (agent-loop.md §4), not a separate
  // session-state feed (frontend.md §4.2); this stream is purely how it
  // pushes the resulting rendered updates out, it never receives anything
  // back on this channel. Cancellation is the kernel closing the gRPC
  // stream; the plugin MUST treat this as normal control flow, never as an
  // error.
  //
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Stream element type is the bare "WidgetUpdate" per frontend.md §4.1's
  // literal spec, naming the domain concept rather than the RPC. Not a
  // uniqueness violation: WidgetUpdate is used by exactly this one RPC.
  rpc Attach(AttachRequest) returns (stream WidgetUpdate);

  // Describe reports this plugin build's own identity — {name, version,
  // source, category, protocol_version} — directly from the running
  // process, rather than the kernel inferring it from a lock-file row.
  // Every one of the six category protocols gains this identical RPC in
  // this protocol revision; it exists specifically for a
  // `dev_overrides`-resolved binary (configuration/lock-file.md's
  // "dev_overrides and identity without a lock entry"), which has no
  // provider {} lock-file entry to read identity from at all.
  rpc Describe(DescribeRequest) returns (DescribeResponse);
}

// DescribeRequest carries no fields — Describe takes no parameters.
message DescribeRequest {}

// DescribeResponse reports this plugin build's own identity, obtained
// directly from the running process rather than a lock-file row —
// configuration/lock-file.md's "dev_overrides and identity without a lock
// entry".
message DescribeResponse {
  pluggableharness.common.v1.ProducerRef producer = 1;
}

// GetCapabilitiesRequest carries no fields — GetCapabilities takes no
// parameters.
message GetCapabilitiesRequest {}

// GetCapabilitiesResponse wraps WidgetCapabilities for the RPC signature,
// per this repo's per-RPC envelope convention (.claude/rules/proto.md).
message GetCapabilitiesResponse {
  WidgetCapabilities capabilities = 1;
}

// WidgetCapabilities is this widget provider's complete capability
// advertisement, per frontend.md §4.1.
message WidgetCapabilities {
  // MUST — the regions this widget intends to contribute to.
  repeated pluggableharness.render.v1.Region regions = 1;

  // This provider's agent.hcl config schema, per configuration.md §4 —
  // what fields Configure's request may be decoded from.
  pluggableharness.config.v1.ConfigSchema config_schema = 2;

  // Hook points this widget can subscribe to in observe mode
  // (agent-loop/hook-dispatch.md), so a mis-declared agent.hcl hook{}
  // block naming an unsupported point can be rejected at config-load
  // time rather than failing at first dispatch.
  repeated pluggableharness.common.v1.HookPoint supported_hook_points = 3;
}

// ConfigureRequest carries this provider's already-decoded agent.hcl block.
message ConfigureRequest {
  // The provider's already-decoded config, per frontend.md §4.1.
  google.protobuf.Struct config = 1;
}

// ConfigureResponse is empty on success. Errors surface as a gRPC status
// per grpc.md — not an in-band field here.
message ConfigureResponse {}

// AttachRequest identifies which session's widget instance to attach to.
message AttachRequest {
  // The session this widget instance is attaching to.
  string session_id = 1;
}

// WidgetUpdate is one pushed update to this widget's rendered content, per
// frontend.md §4.1.
message WidgetUpdate {
  // Which region this update places content into.
  pluggableharness.render.v1.Region region = 1;

  // The content to place.
  pluggableharness.render.v1.RenderTree content = 2;

  // True: replace this widget's prior content in `region`. False: append.
  bool replace = 3;
}

// WidgetErrorCategory classifies a WidgetError, mirroring
// FrontendErrorCategory's shape (frontend.proto) for the widget category —
// resolves frontend/conformance.md's prior open question of whether
// widgets need a structured error type of their own.
enum WidgetErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  WIDGET_ERROR_CATEGORY_UNSPECIFIED = 0;
  // A RenderTree or WidgetUpdate could not be displayed.
  WIDGET_ERROR_CATEGORY_RENDER_FAILED = 1;
  // A WidgetUpdate named a Region this widget's frontend cannot honor.
  WIDGET_ERROR_CATEGORY_REGION_UNSUPPORTED = 2;
  // An error that does not fit any other category.
  WIDGET_ERROR_CATEGORY_UNKNOWN = 3;
}

// WidgetError is the structured error type for the widget category,
// mirroring FrontendError (frontend.proto). Unlike the frontend category
// (whose Attach errors surface in-band via ServerEvent.Error), widget
// Attach has no return channel other than the stream itself — WidgetError
// is carried in the structured detail of a gRPC status on Configure or
// Attach, per .claude/rules/grpc.md's error-taxonomy discipline, not as an
// in-band stream message.
message WidgetError {
  // The error's category.
  WidgetErrorCategory category = 1;
  // A human-readable message.
  string message = 2;
}
