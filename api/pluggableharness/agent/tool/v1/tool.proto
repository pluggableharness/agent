syntax = "proto3";

// Package pluggableharness.agent.tool.v1 defines the tool provider plugin protocol
// described in specifications/tool.md — the wire contract for file I/O,
// shell execution, search, web access, task tracking, sub-agent spawning,
// and similar operations.
package pluggableharness.agent.tool.v1;

import "google/protobuf/struct.proto";
import "pluggableharness/agent/config/v1/config.proto";
import "pluggableharness/agent/render/v1/render.proto";
import "pluggableharness/agent/schema/v1/schema.proto";
import "pluggableharness/agent/slashcommand/v1/slashcommand.proto";

option go_package = "github.com/pluggableharness/agent/pkg/tool/proto/v1;toolv1";

// ToolService is the tool provider plugin protocol described in
// specifications/tool.md §1-§8. A tool provider plugin exposes GetSchema,
// Configure, and Invoke; it MAY additionally implement Render.
service ToolService {
  // GetSchema returns the ToolSchema for every operation this plugin
  // exposes, per tool.md §2. MUST be cheaply re-queryable and MUST NOT
  // require a network call — a provider wrapping a hosted service declares
  // its schema statically; only Invoke talks to the network.
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);

  // Configure decodes this provider's agent.hcl block, per tool.md §3. The
  // request is already-decoded JSON (the schema-to-cty bridge is
  // kernel-internal and never crosses the wire). Errors surface as a gRPC
  // status carrying a ToolError in its structured detail, per grpc.md — not
  // an in-band field on ConfigureResponse.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Invoke executes one tool call and streams back its events, per
  // tool.md §4. Server-streaming, reusing provider.md §1's shape verbatim —
  // a non-incremental operation MUST still implement this shape, emitting
  // exactly one terminal `result` or `error`. Cancellation is the kernel
  // closing the gRPC stream; the plugin MUST treat this as normal control
  // flow (kill any child process, release handles), never as an error.
  rpc Invoke(InvokeRequest) returns (stream InvokeResponse);

  // Render returns a RenderTree for a previously-emitted opaque payload,
  // per tool.md §7. MAY be implemented; if absent, the kernel falls back to
  // its generic default (pretty-printed JSON payload).
  rpc Render(RenderRequest) returns (RenderResponse);
}

// GetSchemaRequest carries no fields — GetSchema takes no parameters.
message GetSchemaRequest {}

// GetSchemaResponse is this provider's complete capability advertisement.
message GetSchemaResponse {
  // One entry per operation this plugin exposes.
  repeated ToolSchema tools = 1;

  // Slash commands this provider contributes, per tool.md §2.1. MAY be
  // empty. Each entry's tool_name MUST reference one of this same
  // provider's own operations declared in `tools` above — a provider
  // cannot declare a slash command that invokes another provider's tool.
  repeated pluggableharness.agent.slashcommand.v1.SlashCommandSpec slash_commands = 2;

  // This provider's agent.hcl config schema, per configuration.md §4 —
  // what fields Configure's request may be decoded from.
  pluggableharness.agent.config.v1.ConfigSchema config_schema = 3;
}

// ConfigureRequest wraps this provider's already-decoded agent.hcl config.
message ConfigureRequest {
  // The provider-specific config, decoded from agent.hcl via the
  // schema-to-cty bridge before crossing the wire.
  google.protobuf.Struct config = 1;
}

// ConfigureResponse is empty on success. Errors surface as a gRPC status
// carrying a ToolError in its detail, per grpc.md — not an in-band field
// here.
message ConfigureResponse {}

// ToolKind is the axis that drives the plan/apply gate, per tool.md §2.
// Deliberately separate from RiskClass: kind is the binary the gate
// mechanically needs, risk is a finer-grained classification within it.
enum ToolKind {
  // Zero value. Never valid for a real operation; its presence on the wire
  // means a caller forgot to set the field.
  TOOL_KIND_UNSPECIFIED = 0;

  // Mutating. Gated behind the plan/apply approval gate.
  TOOL_KIND_RESOURCE = 1;

  // Read-only. Executes freely, subject only to the policy precheck
  // (agent-loop.md §5.4).
  TOOL_KIND_DATA_SOURCE = 2;

  // Blocks the current turn for human input, per tool.md §2.1. Produces no
  // state mutation of its own — the human's answer becomes the result.
  TOOL_KIND_INTERACTIVE = 3;
}

// RiskClass classifies an operation's blast radius, per tool.md §2. Orthogonal
// to ToolKind: kind determines whether the plan/apply gate applies at all,
// risk determines how significant the gated (or inherently ungated) action is.
enum RiskClass {
  // Zero value. Never valid for a real operation; its presence on the wire
  // means a caller forgot to set the field.
  RISK_CLASS_UNSPECIFIED = 0;

  // Inherently unable to mutate anything the plugin controls. MUST be used
  // for TOOL_KIND_DATA_SOURCE and TOOL_KIND_INTERACTIVE alike — neither
  // mutates nor reads anything external, so neither has a blast radius to
  // classify.
  RISK_CLASS_READ_ONLY = 1;

  // A resource operation with narrow, easily-reversible blast radius, e.g.
  // a write to a scratch path.
  RISK_CLASS_LOW = 2;

  // A resource operation with real but bounded blast radius, e.g. editing
  // a tracked source file.
  RISK_CLASS_MODERATE = 3;

  // A resource operation with broad or hard-to-predict blast radius, e.g.
  // arbitrary shell execution.
  RISK_CLASS_HIGH = 4;

  // A resource operation capable of irreversible or wide-blast-radius
  // action, e.g. `rm -rf`, a force-push, or spawning a sub-agent with
  // further unattended write access.
  //
  // A TOOL_KIND_RESOURCE operation MUST declare one of LOW/MODERATE/HIGH/
  // CRITICAL — never READ_ONLY. There is no resource with read_only risk.
  RISK_CLASS_CRITICAL = 5;
}

// ConcurrencySpec declares whether this operation's Invoke calls may run
// concurrently against the same provider process, per tool.md §5.
message ConcurrencySpec {
  // MUST be set, per operation, except for TOOL_KIND_INTERACTIVE. false (or
  // an absent/unset default) means the kernel MUST NOT run any other Invoke
  // call against this provider process concurrently with this one — a
  // coarse, provider-wide lock. true means concurrent Invoke calls against
  // this provider are generally safe. A provider that does not populate
  // this field at all MUST be treated by the kernel as false — the
  // conservative default.
  bool safe = 1;

  // Only meaningful when safe == true. Names of this operation's
  // input_schema fields whose value(s) form a serialization key. The
  // kernel computes key = (provider_name, tool_name, value(key_fields)) and
  // MUST serialize calls sharing an identical key, while still freely
  // parallelizing calls with distinct keys. Omitting key_fields under
  // safe == true asserts that no two calls to this operation can ever
  // conflict — a strong claim, true for e.g. web_search, false for e.g.
  // write_file.
  repeated string key_fields = 2;

  // MUST NOT be declared for TOOL_KIND_INTERACTIVE — the kernel ignores it
  // if present and always enforces strictly sequential execution for
  // interactive calls, regardless of any declared value here (tool.md
  // §2.1).
}

// ToolSchema declares one operation this provider exposes, per tool.md §2.
message ToolSchema {
  // MUST — unique within this provider's namespace, e.g. "read_file".
  string name = 1;

  // MUST — drives the plan/apply gate.
  ToolKind kind = 2;

  // MUST — see RiskClass.
  RiskClass risk = 3;

  // MUST — shown to the model for tool selection and in plan diffs.
  string description = 4;

  // MUST — the common JSON-Schema subset per provider.md §6, describing the
  // shape of ToolCall.arguments for this operation.
  pluggableharness.agent.schema.v1.Schema input_schema = 5;

  // MUST — the common JSON-Schema subset per provider.md §6, describing the
  // shape of ToolResult.payload for this operation.
  pluggableharness.agent.schema.v1.Schema output_schema = 6;

  // MUST — true if Invoke may emit intermediate ToolEvents (output_chunk,
  // progress, partial_result) before the terminal event; false if Invoke
  // always emits exactly one terminal event with no lead-up.
  bool streaming = 7;

  // MUST, except MUST NOT be meaningfully set for TOOL_KIND_INTERACTIVE.
  ConcurrencySpec concurrency = 8;
}

// InvokeRequest wraps the call to execute. A thin per-RPC envelope around
// ToolCall, which keeps its own rich structure independent of the RPC
// signature.
message InvokeRequest {
  // The call to execute.
  ToolCall call = 1;
}

// InvokeResponse wraps one message in the stream Invoke returns. A thin
// per-RPC envelope around ToolEvent, which keeps its own rich structure
// independent of the RPC signature.
message InvokeResponse {
  // The event.
  ToolEvent event = 1;
}

// ToolCall is one request to execute an operation, per tool.md §4.
message ToolCall {
  // MUST — kernel-assigned. Echoed in every ToolEvent for this call, for
  // correlation.
  string id = 1;

  // MUST — matches a ToolSchema.name from this provider's GetSchema
  // response.
  string tool_name = 2;

  // MUST — already-parsed JSON conforming to that ToolSchema's
  // input_schema.
  google.protobuf.Struct arguments = 3;
}

// ToolEvent is one message in the stream Invoke returns, per tool.md §4.
// Exactly one of `result`/`error` closes the stream; `output_chunk`,
// `progress`, and `partial_result` MAY each appear zero or more times
// before it; `exit_status` MAY appear at most once. The relative order of
// `output_chunk` events MUST be preserved by the transport.
message ToolEvent {
  oneof event {
    // Incremental raw output from a process-backed operation.
    OutputChunk output_chunk = 1;

    // A human-readable progress update.
    Progress progress = 2;

    // Incremental structured output, e.g. search hits as they're found.
    PartialResult partial_result = 3;

    // The exit status of a process-backed operation's child process.
    ExitStatus exit_status = 4;

    // The terminal, successful result of this call.
    ToolResult result = 5;

    // The terminal, failed result of this call.
    ToolError error = 6;
  }

  // OutputChunk carries one slice of raw stdout/stderr-shaped output from a
  // process-backed operation.
  message OutputChunk {
    // Which stream this chunk came from.
    OutputStream stream = 1;

    // The chunk's raw bytes.
    bytes data = 2;
  }

  // Progress carries a human-readable status update for a long-running
  // call.
  message Progress {
    // A human-readable description of the current step.
    string message = 1;

    // How far through the operation this call is, in [0.0, 1.0]. Absent
    // means the provider cannot estimate completion fraction.
    optional double fraction_complete = 2;
  }

  // PartialResult carries incremental structured output before the
  // terminal result, e.g. search hits as they're found.
  message PartialResult {
    // The incremental structured payload.
    google.protobuf.Struct payload = 1;
  }

  // ExitStatus carries a process-backed operation's child process exit
  // information. exec-family tools only — a provider for a non-process-
  // backed tool (file read, grep, web fetch) MUST NOT emit this. Appears
  // at most once per Invoke stream.
  message ExitStatus {
    // The child process's exit code.
    int32 exit_code = 1;

    // The signal that terminated the child process, if any. Absent means
    // the process exited normally (exit_code is meaningful on its own).
    optional string signal = 2;
  }
}

// OutputStream distinguishes which underlying stream an OutputChunk came
// from.
enum OutputStream {
  // Zero value. Never valid for a real chunk; its presence on the wire
  // means a caller forgot to set the field.
  OUTPUT_STREAM_UNSPECIFIED = 0;

  // Standard output.
  OUTPUT_STREAM_STDOUT = 1;

  // Standard error.
  OUTPUT_STREAM_STDERR = 2;
}

// ToolResult is the terminal, successful outcome of an Invoke call.
message ToolResult {
  // MUST conform to the ToolSchema.output_schema declared for this call's
  // tool_name; the kernel strictly validates this — a non-conforming
  // payload becomes a ToolError with category TOOL_ERROR_CATEGORY_UNKNOWN
  // rather than being passed through to history.
  google.protobuf.Struct payload = 1;
}

// ToolErrorCategory classifies why an Invoke call failed, per tool.md §8.
// Deliberately distinct from provider.md §8's ProviderErrorCategory — there
// is no RATE_LIMITED or CONTEXT_LENGTH_EXCEEDED here, those are
// model-vendor concepts. The two enums MUST NOT be merged even though the
// surrounding error-envelope shape (category/message/retryable) is
// parallel.
enum ToolErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  TOOL_ERROR_CATEGORY_UNSPECIFIED = 0;

  // Input failed input_schema validation.
  TOOL_ERROR_CATEGORY_INVALID_ARGUMENTS = 1;

  // The target of the operation doesn't exist (path, URL, symbol, ...).
  TOOL_ERROR_CATEGORY_NOT_FOUND = 2;

  // OS/policy denied the underlying operation.
  TOOL_ERROR_CATEGORY_PERMISSION_DENIED = 3;

  // The operation ran but failed on its own terms (non-zero exit, compiler
  // error, HTTP 4xx/5xx) — not a plugin bug.
  TOOL_ERROR_CATEGORY_EXECUTION_FAILED = 4;

  // Exceeded a plugin- or kernel-enforced deadline.
  TOOL_ERROR_CATEGORY_TIMEOUT = 5;

  // The provider detected a conflicting concurrent call it could not
  // serialize itself (see ConcurrencySpec) — signals the kernel to retry
  // serialized.
  TOOL_ERROR_CATEGORY_CONCURRENCY_CONFLICT = 6;

  // The stream was cancelled per tool.md §1 — not "an error" in the
  // failure sense; kept distinct so the kernel doesn't surface it to the
  // model as a tool failure when the whole turn is being aborted anyway.
  TOOL_ERROR_CATEGORY_CANCELLED = 7;

  // The plugin subprocess itself died mid-Invoke (transport error, not a
  // graceful error event the plugin chose to emit). MUST be
  // kernel-synthesized only — a plugin process that crashes obviously
  // cannot emit this itself; the kernel detects the crash and synthesizes
  // this category.
  TOOL_ERROR_CATEGORY_PROCESS_CRASHED = 8;

  // Anything else. MUST include the raw underlying error in
  // ToolError.details.
  TOOL_ERROR_CATEGORY_UNKNOWN = 9;
}

// ToolError is the terminal, failed outcome of an Invoke call.
message ToolError {
  // MUST.
  ToolErrorCategory category = 1;

  // MUST — human-readable.
  string message = 2;

  // MUST.
  bool retryable = 3;

  // MAY — provider-specific structured detail. MUST include the raw
  // underlying error for category TOOL_ERROR_CATEGORY_UNKNOWN.
  optional google.protobuf.Struct details = 4;
}

// RenderRequest carries the opaque payload to render, per tool.md §7. See
// grpc.md's Emit->Render->Paint carve-out for why this field stays `bytes`
// rather than a strongly-typed message.
message RenderRequest {
  // The opaque emitted payload to render.
  bytes payload = 1;
}

// RenderResponse wraps the rendered tree. A thin per-RPC envelope around
// RenderTree, which keeps its own rich structure independent of the RPC
// signature.
message RenderResponse {
  // The rendered tree.
  pluggableharness.agent.render.v1.RenderTree tree = 1;
}
