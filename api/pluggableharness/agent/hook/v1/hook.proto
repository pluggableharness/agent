syntax = "proto3";

// Package pluggableharness.agent.hook.v1 defines the hook-dispatch RPC surface
// described in agent-loop/hook-dispatch.md and architecture.md §Hook
// dispatch semantics: the wire contract the kernel uses to invoke any
// plugin (of any of the six categories) that declares a `hook{}` block in
// agent.hcl. This is deliberately one shared service rather than a
// per-category RPC — hashicorp/go-plugin (.claude/rules/plugin-runtime.md)
// muxes multiple gRPC services over one broker connection, so the kernel
// dials HookSubscriberService on the same subprocess that already serves
// that plugin's own category service. A plugin with no `hook{}` blocks in
// agent.hcl simply never has it called.
//
// context-assemble is deliberately absent from this surface's HookPoint
// enum below — it stays on ContextService.Contribute
// (context/protocol.md#contribute-the-context-assemble-rpc; architecture.md
// §Hook dispatch semantics), which already carries the full accumulated
// ContextSection chain and doesn't need a second, competing dispatch path.
// This surface serves the other eight hook points only.
package pluggableharness.agent.hook.v1;

import "pluggableharness/agent/common/v1/common.proto";
import "pluggableharness/agent/content/v1/content.proto";
import "pluggableharness/agent/model/v1/model.proto";
import "pluggableharness/agent/plan/v1/plan.proto";
import "pluggableharness/agent/session/v1/session.proto";
import "pluggableharness/agent/tool/v1/tool.proto";

option go_package = "github.com/pluggableharness/agent/pkg/hook/proto/v1;hookv1";

// HookSubscriberService is the hook-dispatch protocol described in
// agent-loop/hook-dispatch.md: the kernel invokes a subscribing plugin
// once per hook-point firing it's declared for, in agent.hcl declaration
// order alongside every other subscriber at that point
// (agent-loop/hook-dispatch.md#dispatch-order-and-payload-flow). Every
// plugin category MAY implement this service; whether the kernel ever
// dials it for a given plugin process is entirely a function of that
// plugin's own agent.hcl `hook{}` declarations, not its category.
service HookSubscriberService {
  // DispatchHook delivers one hook-point firing to one subscriber. Unary,
  // not streaming: one invocation is one request/one response
  // (agent-loop/hook-dispatch.md#dispatch-order-and-payload-flow). Per-
  // subscriber timeout is a ctx deadline the kernel sets
  // (.claude/rules/grpc.md "Context and deadlines";
  // agent-loop/hook-dispatch.md#timeout-behavior), not a wire field on
  // this request. Cancellation (the kernel closing the call because the
  // turn is being aborted) is normal control flow, per
  // .claude/rules/grpc.md — never logged as a failure.
  rpc DispatchHook(DispatchHookRequest) returns (DispatchHookResponse);
}

// HookPoint identifies which of the eight dispatchable points in the agent
// loop a DispatchHookRequest fires for. Not carried directly on
// DispatchHookRequest (the set HookPayload oneof variant already implies
// the point) — this enum exists for HookError, which has no oneof to infer
// a point from. architecture.md §Hook dispatch semantics enumerates these
// nine hook-point names; context-assemble (the ninth) is deliberately
// excluded here — see this file's package comment.
enum HookPoint {
  // Zero value. Never valid on the wire; its presence means a caller
  // forgot to set the field.
  HOOK_POINT_UNSPECIFIED = 0;
  // Session creation, before the first turn begins.
  HOOK_POINT_SESSION_START = 1;
  // Immediately before a model provider's StreamCompletion is called.
  HOOK_POINT_PRE_MODEL_CALL = 2;
  // Immediately after a model turn's canonical message has been
  // assembled from the completion stream.
  HOOK_POINT_POST_MODEL_RESPONSE = 3;
  // Immediately before a plan item's tool call is applied.
  HOOK_POINT_PRE_TOOL_CALL = 4;
  // Once a turn's Plan has been fully built, before plan/apply gate
  // dispatch. The kernel-privileged policy veto subscriber
  // (architecture.md §Policy — first-party, not a plugin category) always
  // runs at this point.
  HOOK_POINT_PLAN_READY = 5;
  // Immediately after a plan item's tool call has produced a terminal
  // ToolResult or ToolError.
  HOOK_POINT_POST_TOOL_CALL = 6;
  // Immediately after a turn's whole Plan has finished applying (every
  // item reached a terminal ApplyOutcome).
  HOOK_POINT_POST_APPLY = 7;
  // Session termination, once the session has reached a terminal
  // SessionStatus.
  HOOK_POINT_SESSION_END = 8;
}

// HookMode is the operator-declared subscription mode for one plugin's
// hook{} block, per architecture.md §Hook dispatch semantics and
// agent-loop/hook-dispatch.md#dispatch-order-and-payload-flow. Mode is
// per-subscription (agent.hcl-declared), not per-payload — it is not
// carried in HookPayload itself, only echoed on DispatchHookRequest so the
// subscriber knows which of DispatchHookResponse's three outcome shapes is
// expected of it.
enum HookMode {
  // Zero value. Never valid on the wire; its presence means a caller
  // forgot to set the field.
  HOOK_MODE_UNSPECIFIED = 0;
  // Read-only, fire-and-forget. A raised error or malformed response is
  // logged and dispatch continues; an observe subscriber can never alter
  // the payload or abort the chain
  // (agent-loop/hook-dispatch.md#subscriber-error-handling).
  HOOK_MODE_OBSERVE = 1;
  // Sequential chain member: receives the prior stage's payload, returns
  // a modified version of the same variant. An error or malformed
  // response aborts the remainder of that hook's chain and surfaces a
  // hook_error event (agent-loop/hook-dispatch.md#subscriber-error-handling).
  HOOK_MODE_TRANSFORM = 2;
  // Returns an explicit allow/deny verdict. An error or timeout is
  // treated identically to an explicit deny — fail-closed
  // (agent-loop/hook-dispatch.md#timeout-behavior).
  HOOK_MODE_VETO = 3;
}

// HookPayload carries one hook point's data. Exactly one oneof variant is
// set; which variant is set *is* the point being dispatched — the
// parallel HookPoint enum above exists only for contexts (HookError) that
// have no oneof to infer the point from.
message HookPayload {
  oneof payload {
    // Fires at HOOK_POINT_SESSION_START.
    SessionStartPayload session_start = 1;
    // Fires at HOOK_POINT_PRE_MODEL_CALL.
    PreModelCallPayload pre_model_call = 2;
    // Fires at HOOK_POINT_POST_MODEL_RESPONSE.
    PostModelResponsePayload post_model_response = 3;
    // Fires at HOOK_POINT_PRE_TOOL_CALL.
    PreToolCallPayload pre_tool_call = 4;
    // Fires at HOOK_POINT_PLAN_READY.
    PlanReadyPayload plan_ready = 5;
    // Fires at HOOK_POINT_POST_TOOL_CALL.
    PostToolCallPayload post_tool_call = 6;
    // Fires at HOOK_POINT_POST_APPLY.
    PostApplyPayload post_apply = 7;
    // Fires at HOOK_POINT_SESSION_END.
    SessionEndPayload session_end = 8;
  }
}

// SessionStartPayload fires once, at session creation. No field here is
// transform-mutable per agent-loop/hook-dispatch.md's per-point mutable-
// field table — session identity and startup parameters are fixed by the
// time this hook fires.
message SessionStartPayload {
  // The new session's id. MUST be set. Immutable.
  string session_id = 1;
  // The agent.hcl profile this session was created under. MUST be set.
  // Immutable.
  string profile = 2;
  // The parent session's id, when this is a sub-agent session
  // (agent-loop/subagents.md). Absent for a root session. Immutable.
  optional string parent_session_id = 3;
  // The session's working directory. MUST be set. Immutable.
  string working_directory = 4;
}

// PreModelCallPayload fires immediately before a model provider's
// StreamCompletion is invoked. A transform subscriber MAY rewrite
// `messages` (e.g. redaction, injection of an additional instruction); it
// MUST NOT alter `model` — a hook subscriber does not get to silently
// reroute a turn to a different model than the one the turn algorithm
// already resolved.
message PreModelCallPayload {
  // The messages about to be sent to the model. Transform-mutable.
  repeated pluggableharness.agent.content.v1.Message messages = 1;
  // The model this call targets. Immutable.
  pluggableharness.agent.model.v1.ModelRef model = 2;
}

// PostModelResponsePayload fires immediately after a model turn's
// canonical message has been assembled, before it is persisted
// (EVENT_KIND_MESSAGE). Primarily an observe-mode point (memory providers
// recording the turn, widgets displaying live usage) — no field here is
// documented transform-mutable in agent-loop/hook-dispatch.md's per-point
// table; a transform subscriber at this point MUST return the payload
// unchanged.
message PostModelResponsePayload {
  // The assembled assistant message. MUST be set.
  pluggableharness.agent.content.v1.Message message = 1;
  // Which model-provider build produced `message`, for supersedes/replay
  // attribution (architecture.md §Versioning & schema drift —
  // "supersedes"). MUST be set.
  pluggableharness.agent.common.v1.ProducerRef model = 2;
  // Token usage for the completion that produced `message`. MUST be set.
  pluggableharness.agent.model.v1.Usage usage = 3;
  // The kernel-computed cost, in USD, of the completion that produced
  // `message` (model/protocol.md#cost-computation — the provider never
  // computes cost itself). MUST be set.
  double cost_usd = 4;
}

// PreToolCallPayload fires immediately before an already-allowed plan
// item's tool call is applied. No field here is documented transform-
// mutable — a hook subscriber observes or vetoes an about-to-execute call,
// it does not get to silently rewrite its arguments; argument mutation is
// the plan/apply gate's own concern (agent-loop.md §5), not a general hook
// capability.
message PreToolCallPayload {
  // The call about to be applied. MUST be set. Immutable.
  pluggableharness.agent.tool.v1.ToolCall call = 1;
  // The originating plan item, carrying the policy decision that allowed
  // this call through to apply. MUST be set. Immutable.
  pluggableharness.agent.plan.v1.PlanItem plan_item = 2;
}

// PlanReadyPayload fires once a turn's Plan has been fully built, before
// the plan/apply gate dispatches it. This is the veto-bearing hook point:
// the kernel-privileged policy subscriber (architecture.md §Policy —
// first-party, not a plugin category) always runs here in HOOK_MODE_VETO.
// No field here is transform-mutable — a hook subscriber does not rewrite
// plan items; only the plan/apply gate itself and the policy veto affect
// what applies.
message PlanReadyPayload {
  // The fully-built plan awaiting policy evaluation. MUST be set.
  // Immutable.
  pluggableharness.agent.plan.v1.Plan plan = 1;
}

// PostToolCallPayload fires immediately after a plan item's tool call
// reaches a terminal outcome. Observe-only in practice — no field here is
// documented transform-mutable.
message PostToolCallPayload {
  // The call that completed. MUST be set. Immutable.
  pluggableharness.agent.tool.v1.ToolCall call = 1;
  oneof outcome {
    // The call's successful terminal result.
    pluggableharness.agent.tool.v1.ToolResult result = 2;
    // The call's failed terminal result.
    pluggableharness.agent.tool.v1.ToolError error = 3;
  }
}

// PostApplyPayload fires once a turn's whole Plan has finished applying —
// every item has reached a terminal ApplyOutcome
// (pluggableharness.agent.plan.v1.ApplyResult.ApplyOutcome). Reuses
// plan.v1.ApplyResult rather than defining its own per-item outcome shape,
// so the post-apply hook's subject and the EVENT_KIND_APPLY event (the
// forthcoming event.v1 package) are the exact same message. Observe-only —
// applying has already happened by the time this fires, so there is
// nothing left to transform.
message PostApplyPayload {
  // The turn's per-item apply outcomes. MUST be set.
  pluggableharness.agent.plan.v1.ApplyResult apply = 1;
}

// SessionEndPayload fires once, when a session reaches a terminal
// SessionStatus. No field here is transform-mutable — a session's outcome
// is already final by the time this fires.
message SessionEndPayload {
  // The session that ended. MUST be set. Immutable.
  string session_id = 1;
  // The session's terminal status. MUST be set (never
  // SESSION_STATUS_RUNNING). Immutable.
  pluggableharness.agent.session.v1.SessionStatus status = 2;
}

// DispatchHookRequest is one hook-point firing delivered to one
// subscriber.
message DispatchHookRequest {
  // The payload for this firing. MUST be set; the set oneof variant
  // implicitly identifies the hook point.
  HookPayload payload = 1;
  // The operator-configured mode this subscription runs under
  // (agent.hcl's hook{} block). MUST be set — tells the subscriber which
  // of DispatchHookResponse's three outcome shapes is expected back.
  HookMode mode = 2;
  // Disambiguates a plugin declaring more than one hook{} block at the
  // same HookPoint. Absent when a plugin has exactly one subscription at
  // this point.
  optional string subscription_id = 3;
}

// DispatchHookResponse carries a subscriber's outcome, shaped by the
// HookMode the request declared. The kernel MUST reject (surfacing a
// hook_error, per agent-loop/hook-dispatch.md#subscriber-error-handling)
// a response whose oneof variant doesn't match the request's declared
// mode — HOOK_ERROR_CATEGORY_INVALID_RESPONSE.
message DispatchHookResponse {
  oneof outcome {
    // The subscriber's acknowledgment, for a HOOK_MODE_OBSERVE request.
    ObserveAck observe = 1;
    // The subscriber's modified payload, for a HOOK_MODE_TRANSFORM
    // request.
    TransformResult transform = 2;
    // The subscriber's allow/deny verdict, for a HOOK_MODE_VETO request.
    VetoResult veto = 3;
  }

  // ObserveAck is empty. The kernel discards it (and any payload an
  // observe subscriber mistakenly returns) unconditionally — observe mode
  // can never alter the payload, per
  // agent-loop/hook-dispatch.md#subscriber-error-handling.
  message ObserveAck {}

  // TransformResult carries a transform subscriber's modified payload.
  message TransformResult {
    // MUST be the same oneof variant as the request's payload. MUST only
    // mutate the fields this hook point documents as transform-mutable
    // (see each *Payload message's own comment) — the kernel MUST reject
    // a response that changes an immutable field or the variant itself,
    // per agent-loop/hook-dispatch.md#subscriber-error-handling.
    HookPayload payload = 1;
  }

  // VetoResult carries a veto subscriber's allow/deny verdict.
  message VetoResult {
    // MUST be set. HOOK_DECISION_UNSPECIFIED is treated as an invalid
    // response (HOOK_ERROR_CATEGORY_INVALID_RESPONSE), not as an implicit
    // deny — the fail-closed behavior for a genuinely absent/erroring
    // response is handled at the gRPC-status level, not by this enum's
    // zero value.
    HookDecision decision = 1;
  }
}

// HookDecision is a veto subscriber's coarse allow/deny verdict over a
// whole HookPayload. Deliberately distinct from
// pluggableharness.agent.plan.v1.PlanDecision — that enum is per-plan-item
// and carries PENDING/ASK, which are meaningless for a hook-level veto;
// the two enums MUST NOT be merged, per .claude/rules/proto.md's
// no-untyped-overload discipline (see also ToolErrorCategory vs
// ModelErrorCategory for the same non-merge precedent).
enum HookDecision {
  // Zero value. Never valid as a deliberately-chosen verdict; its
  // presence on the wire means a caller forgot to set the field.
  HOOK_DECISION_UNSPECIFIED = 0;
  // The dispatch chain proceeds normally.
  HOOK_DECISION_ALLOW = 1;
  // The kernel MUST NOT let the vetoed action proceed. What "the action"
  // means is point-specific: at HOOK_POINT_PLAN_READY it means the whole
  // plan (or, for the kernel-privileged policy subscriber, the
  // per-item decisions policy itself produces directly — a third-party
  // veto subscriber at plan-ready returns only this coarse ALLOW/DENY
  // over the whole plan, per architecture.md §Policy — first-party, not a
  // plugin category).
  HOOK_DECISION_DENY = 2;
}

// HookErrorCategory classifies why a hook dispatch to one subscriber
// failed. Deliberately its own enum, not reused from tool.v1 or model.v1 —
// per .claude/rules/proto.md, a category proto's error taxonomy is never
// merged with another category's even where the surrounding shape is
// parallel.
enum HookErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  HOOK_ERROR_CATEGORY_UNSPECIFIED = 0;
  // A transform subscriber raised an error or returned a malformed
  // response. Aborts the remainder of that hook's chain
  // (agent-loop/hook-dispatch.md#subscriber-error-handling).
  HOOK_ERROR_CATEGORY_TRANSFORM_FAILED = 1;
  // A veto subscriber raised an error. Treated identically to an
  // explicit deny — fail-closed
  // (agent-loop/hook-dispatch.md#subscriber-error-handling).
  HOOK_ERROR_CATEGORY_VETO_FAILED = 2;
  // The subscriber exceeded its per-subscriber deadline
  // (agent-loop/hook-dispatch.md#timeout-behavior). For a veto
  // subscriber, resolved identically to HOOK_ERROR_CATEGORY_VETO_FAILED —
  // fail-closed deny.
  HOOK_ERROR_CATEGORY_TIMEOUT = 3;
  // The subscriber's DispatchHookResponse didn't match what its declared
  // HookMode requires — wrong oneof variant, or (for transform) a
  // payload variant that doesn't match the request's, or a mutation to a
  // field this hook point doesn't document as transform-mutable.
  HOOK_ERROR_CATEGORY_INVALID_RESPONSE = 4;
  // The subscriber's plugin subprocess died mid-dispatch (transport
  // error, not a graceful error the plugin chose to return). MUST be
  // kernel-synthesized only, mirroring
  // tool/conformance.md#error-taxonomy's TOOL_ERROR_CATEGORY_PROCESS_CRASHED
  // — a plugin process that crashes obviously cannot emit this itself.
  HOOK_ERROR_CATEGORY_PROCESS_CRASHED = 5;
  // Anything else.
  HOOK_ERROR_CATEGORY_UNKNOWN = 6;
}

// HookError is the structured detail describing one failed hook dispatch.
// Also the payload shape the kernel-synthesized EVENT_KIND_HOOK_ERROR
// event carries (kernel.v1.EventKind, state-backend.md §The kind enum) —
// the forthcoming event.v1 package's HookErrorEvent wraps this same
// message rather than redefining it.
message HookError {
  // Which hook point the failing dispatch was for. MUST be set.
  HookPoint point = 1;
  // Which plugin build the failing subscriber was. MUST be set.
  pluggableharness.agent.common.v1.ProducerRef subscriber = 2;
  // The HookMode the failing subscription was declared under. MUST be
  // set.
  HookMode mode = 3;
  // Which category of failure this is. MUST be set.
  HookErrorCategory category = 4;
  // Human-readable detail, e.g. the raw subscriber error message.
  string message = 5;
}
