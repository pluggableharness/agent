syntax = "proto3";

// Package pluggableharness.agent.log.v1 defines the structured log entry types described
// in specifications/kernel-callbacks.md §5 — how a plugin's own log output
// reaches the kernel's centralized logging instead of vanishing into an
// unread subprocess stderr. Consumed by pluggableharness.agent.kernel.v1's Log RPC
// (KernelCallbackService), the plugin-to-kernel calling channel every
// plugin gets at handshake.
package pluggableharness.agent.log.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/pluggableharness/agent/pkg/log/proto/v1;logv1";

// LogLevel is a log entry's severity. Mirrors Go's log/slog level model —
// see specifications/kernel-callbacks.md §5 for how TRACE and FATAL (which
// slog doesn't define natively) map onto slog's custom-level mechanism.
enum LogLevel {
  // Zero value. Never valid for a real entry; its presence on the wire
  // means a caller forgot to set the field.
  LOG_LEVEL_UNSPECIFIED = 0;
  // Finer-grained than DEBUG. Maps to a custom slog.Level below
  // slog.LevelDebug on the kernel side (kernel-callbacks.md §5).
  LOG_LEVEL_TRACE = 1;
  LOG_LEVEL_DEBUG = 2;
  LOG_LEVEL_INFO = 3;
  LOG_LEVEL_WARN = 4;
  LOG_LEVEL_ERROR = 5;
  // A severity signal only — logging at FATAL does NOT itself terminate
  // the plugin or the kernel (kernel-callbacks.md §5). Maps to a custom
  // slog.Level above slog.LevelError on the kernel side.
  LOG_LEVEL_FATAL = 6;
}

// LogEntry is one structured log line, mirroring Go's log/slog record
// model: a level, an optional logger name, a message, and structured
// key/value attributes.
message LogEntry {
  // This entry's severity. MUST be set.
  LogLevel level = 1;

  // A dotted sub-component name within the plugin, e.g. "anthropic.retry",
  // mirroring slog's logger-naming convention. MAY be empty (the plugin's
  // root/unnamed logger).
  string logger = 2;

  // The human-readable log message. MUST be set.
  string message = 3;

  // Structured attributes, mirroring slog.Attr's key/value model. A
  // Struct because the attribute set is genuinely open-ended per call
  // site (see .claude/rules/proto.md's Struct carve-out). MAY be empty.
  google.protobuf.Struct fields = 4;

  // When this event occurred at the plugin — not when the kernel received
  // it. MUST be set. Meaningful when a plugin buffers log output before
  // flushing it through Log.
  google.protobuf.Timestamp time = 5;
}
