syntax = "proto3";

// Package pluggableharness.agent.context.v1 defines the context provider plugin protocol
// described in specifications/context.md — plugins that hook
// context-assemble and contribute content to the prompt before each model
// call (e.g. a CLAUDE.md reader, an AGENTS.md reader, a git-status/file-tree
// summarizer). See .claude/rules/proto.md.
package pluggableharness.agent.context.v1;

import "google/protobuf/struct.proto";
import "pluggableharness/agent/config/v1/config.proto";
import "pluggableharness/agent/content/v1/content.proto";
import "pluggableharness/agent/model/v1/model.proto";
import "pluggableharness/agent/render/v1/render.proto";
import "pluggableharness/agent/slashcommand/v1/slashcommand.proto";

option go_package = "github.com/pluggableharness/agent/pkg/context/proto/v1;contextv1";

// ContextService is the context provider plugin protocol described in
// specifications/context.md. A context provider plugin exposes
// GetCapabilities, Configure, and Contribute (context.md §1, all MUST); it
// MAY additionally implement Render (§9).
service ContextService {
  // GetCapabilities reports this provider's static properties — its
  // requested token budget, content stability, whether it acts as a
  // compactor, and any slash commands or config schema it declares.
  // context.md §2.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Configure delivers this provider's agent.hcl config block, already
  // decoded via the schema-to-cty bridge. context.md §3. MUST reject with a
  // structured error (surfaced as a ContextError in the gRPC status detail,
  // per .claude/rules/grpc.md) if a declared source path/glob resolves to
  // nothing on disk, rather than deferring to a silent-empty Contribute at
  // first call.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Contribute is the context-assemble RPC: the kernel invokes it at least
  // once per turn, before each model call, and the provider returns the
  // full accumulated ContextSection chain with its own section appended.
  // context.md §1 and §4 (both MUST). Deliberately unary, not streamed —
  // unlike a model provider's StreamCompletion, context assembly happens
  // before the model call starts and convention-file/orientation content is
  // small enough not to need token-level streaming. Contribute MUST return
  // the full accumulated section chain (this provider's own section
  // appended to prior_sections), never a delta.
  //
  // buf:lint:ignore RPC_REQUEST_STANDARD_NAME
  // buf:lint:ignore RPC_RESPONSE_STANDARD_NAME
  // Request/response are the bare "ContextRequest"/"ContextContribution"
  // per context.md §4's literal spec. Neither is reused by another RPC in
  // this file (no uniqueness violation) — this is purely a naming-style
  // preference, and the spec's own names carry real documentation value.
  rpc Contribute(ContextRequest) returns (ContextContribution);

  // Render optionally renders this provider's contribution via the general
  // Emit->Render->Paint pipeline, e.g. to display an injected CLAUDE.md
  // section collapsed by default in a transcript view. context.md §9. MAY
  // be implemented; if not, the kernel falls back to its generic default
  // rendering.
  rpc Render(RenderRequest) returns (RenderResponse);
}

// GetCapabilitiesRequest carries no fields — GetCapabilities takes no
// request-scoped parameters.
message GetCapabilitiesRequest {}

// GetCapabilitiesResponse wraps ContextCapabilities for the RPC signature,
// per this repo's per-RPC envelope convention (.claude/rules/proto.md).
message GetCapabilitiesResponse {
  ContextCapabilities capabilities = 1;
}

// ConfigureRequest wraps the provider's agent.hcl config block, already
// decoded via the schema-to-cty bridge, for the Configure RPC.
message ConfigureRequest {
  // The decoded config object. Field contents are provider-specific — which
  // file(s)/globs to read, max-hop @import depth, whether to strip HTML
  // comments, etc. (context.md §3).
  google.protobuf.Struct config = 1;
}

// Stability hints whether a ContextSection's content changes turn to turn,
// used both as ContextCapabilities' provider-wide declaration and per
// ContextSection. context.md §7: this is a direct translation of the
// research's strongest cross-cutting finding — harnesses converge on a
// tools -> system -> static-project-context -> conversation-tail prefix
// ordering because it is a constraint, not a preference, for prompt-cache
// reuse.
enum Stability {
  // Zero value. Never valid for a real capability or section declaration;
  // its presence on the wire means a caller forgot to set the field.
  STABILITY_UNSPECIFIED = 0;
  // Content that doesn't change turn to turn for the life of the session,
  // e.g. a repo's CLAUDE.md.
  STABILITY_STATIC = 1;
  // Content that's recomputed per turn, e.g. git status or a file tree.
  STABILITY_DYNAMIC = 2;
}

// ContextCapabilities reports a context provider's static properties.
// context.md §2. stability and compactor MUST be re-queryable cheaply and
// MUST NOT depend on a live read of the content source — a provider reading
// CLAUDE.md declares stability as a fixed property of the plugin, not a
// per-call judgment.
message ContextCapabilities {
  // The token cap this provider requests if agent.hcl does not override it.
  // MUST be set. context.md §2, §6.
  int64 default_token_budget = 1;

  // Whether this provider's contributed content changes turn to turn. MUST
  // be set. context.md §2, §7.
  Stability stability = 2;

  // Whether this provider acts as a compactor: MAY rewrite, merge, or drop
  // other providers' sections in the chain it receives, and MAY receive
  // conversation_history on ContextRequest and return rewritten_history.
  // MUST be set; defaults to false. context.md §5, §5.1.
  bool compactor = 3;

  // Slash commands this provider contributes. MAY be empty.
  // context.md §2, configuration.md §5.
  repeated pluggableharness.agent.slashcommand.v1.SlashCommandSpec slash_commands = 4;

  // This provider's agent.hcl config schema, advertised so the kernel knows
  // what fields Configure accepts. configuration.md §4.
  pluggableharness.agent.config.v1.ConfigSchema config_schema = 5;
}

// ConfigureResponse is empty on success. A Configure failure (e.g. a
// declared source path/glob resolving to nothing) surfaces as a gRPC status
// carrying a ContextError in its structured detail, per
// .claude/rules/grpc.md — not as an in-band field on this message.
message ConfigureResponse {}

// ContextRequest is the context-assemble RPC's request, delivered to
// Contribute once per firing. context.md §4.
message ContextRequest {
  // The current session's identifier.
  string session_id = 1;

  // The parent session's identifier, when this session is a sub-agent
  // session. Empty for a top-level session.
  string parent_session_id = 2;

  // Which turn of the session this firing is for.
  int64 turn_number = 3;

  // The kernel's computed token allocation for this provider on this call.
  // MUST be set. A returned section MUST NOT exceed this. context.md §4,
  // §6.
  int64 token_budget = 4;

  // The model this contribution is being assembled for, so the provider can
  // tailor content (and compute tokens against the right budget) for the
  // model that will actually consume it. MUST be set. context.md §4.
  pluggableharness.agent.model.v1.ModelTarget model_target = 5;

  // Paths touched so far this session, enabling JIT-scoped contributions
  // (e.g. a subdirectory-scoped convention-file reader). MAY be empty, e.g.
  // at turn 0 / session start. context.md §4, §8.
  repeated string files_touched = 6;

  // The session's current working directory.
  string working_directory = 7;

  // The accumulated output of earlier providers in this hook's
  // declaration-order chain. MUST be set (MAY be empty on the first
  // provider in the chain). context.md §4, §5.
  repeated ContextSection prior_sections = 8;

  // The session's conversation history. Populated ONLY for a provider whose
  // ContextCapabilities.compactor == true; a non-compactor provider MUST
  // NOT receive this — for those providers this field arrives empty, which
  // is indistinguishable from (and semantically equivalent to) "not
  // provided". context.md §5.1.
  repeated pluggableharness.agent.content.v1.Message conversation_history = 9;
}

// ContextSection is one provider's contribution to the assembled prompt
// context. context.md §4, §7.
message ContextSection {
  // The producing plugin's declared name — a plain string, not a
  // common.v1.ProducerRef, used as the identity key for a provider
  // re-finding and replacing its own prior section.
  string provider = 1;

  // Human-readable label the kernel uses to wrap this section in a clearly
  // delimited boundary when concatenating the chain into the final prompt.
  // MUST be set. context.md §4, §7.
  string label = 2;

  // The section's content, in emission order. MUST be set. Text-only in
  // v1 — the kernel MUST reject a non-text block here rather than silently
  // dropping it. context.md §4, §7, §11.
  repeated pluggableharness.agent.content.v1.ContentBlock content = 3;

  // This section's token count, computed via the kernel's CountTokens
  // callback (kernel-callbacks.md §2), never a provider-local heuristic.
  // MUST be set. context.md §4.
  int64 tokens = 4;

  // Whether this section's content changes turn to turn. context.md §7.
  Stability stability = 5;

  // Whether this section was truncated to fit its budget. Per context.md
  // §6, setting this true is not itself sufficient to satisfy the budget
  // constraint — a section that still exceeds token_budget MUST be
  // rejected by the kernel regardless of this flag.
  bool truncated = 6;
}

// ContextContribution is Contribute's response: the full, possibly-modified
// section chain, with this provider's own section appended — never a
// delta. context.md §4.
message ContextContribution {
  // The full accumulated chain, in declaration order, including this
  // provider's own new or updated section(s).
  repeated ContextSection sections = 1;

  // The session's conversation history, rewritten to replace what was sent
  // in ContextRequest.conversation_history. MAY be included by a compactor
  // provider (ContextCapabilities.compactor == true) alongside its section
  // contribution. When present, the kernel MUST replace the turn's
  // conversation history with this before the next model call. context.md
  // §5.1.
  repeated pluggableharness.agent.content.v1.Message rewritten_history = 2;
}

// ContextErrorCategory classifies a context provider's failures.
// context.md §10 — smaller than the model-provider taxonomy
// (model.md §8), but a plugin MUST still classify failures rather than
// collapsing them into one generic error.
enum ContextErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  CONTEXT_ERROR_CATEGORY_UNSPECIFIED = 0;
  // A declared file/glob/source was unreadable at call time (deleted
  // mid-session, permission error). The kernel's expected reaction: drop
  // the section for this turn, log; do not fail the turn.
  CONTEXT_ERROR_CATEGORY_SOURCE_UNAVAILABLE = 1;
  // The provider's own section (or, for a compactor, its whole returned
  // chain) exceeds token_budget. The kernel's expected reaction: reject
  // per context.md §6; do not fail the turn for a non-compactor violator.
  CONTEXT_ERROR_CATEGORY_BUDGET_EXCEEDED = 2;
  // A non-compactor provider mutated a section it doesn't own (context.md
  // §5). The kernel's expected reaction: discard the entire response,
  // restore the prior chain, log the violation.
  CONTEXT_ERROR_CATEGORY_SCOPE_VIOLATION = 3;
  // A malformed request — a kernel/adapter bug. MUST NOT be retried as-is;
  // MUST be logged with the full request shape.
  CONTEXT_ERROR_CATEGORY_INVALID_REQUEST = 4;
  // Any other failure. MUST include the raw plugin error message for
  // debugging.
  CONTEXT_ERROR_CATEGORY_UNKNOWN = 5;
}

// ContextError is the structured error detail a context provider attaches
// to a failed RPC's gRPC status, per .claude/rules/grpc.md's error-taxonomy
// convention.
message ContextError {
  // Which category of failure this is.
  ContextErrorCategory category = 1;

  // Human-readable error detail, e.g. the raw plugin error message for
  // CONTEXT_ERROR_CATEGORY_UNKNOWN.
  string message = 2;

  // Whether the kernel may retry the call that produced this error.
  bool retryable = 3;
}

// RenderRequest carries the opaque payload for the optional Render RPC.
message RenderRequest {
  // The opaque emitted payload to render — see .claude/rules/grpc.md's
  // Emit->Render->Paint carve-out. Never interpreted by the kernel or any
  // other plugin; only the producing provider's own Render implementation
  // understands its shape.
  bytes payload = 1;
}

// RenderResponse wraps the rendered output of the optional Render RPC.
message RenderResponse {
  // The rendered tree, per the general Emit->Render->Paint pipeline
  // (frontend.md §1). context.md §9.
  pluggableharness.agent.render.v1.RenderTree tree = 1;
}
