syntax = "proto3";

// Package pluggableharness.agent.memory.v1 defines the memory provider plugin protocol
// described in specifications/memory.md — plugins that persist knowledge
// across sessions (the write side) and recall it into future ones (the
// read side). A distinct plugin category with its own protocol, not a
// reuse of context.md's Contribute RPC, so record-specific data (type,
// scope, provenance, ratification status) stays first-class through a
// dedicated Recall RPC; the kernel adapts results into ContextSections
// before merging them into the assembled prompt (memory.md §6).
package pluggableharness.agent.memory.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "pluggableharness/agent/config/v1/config.proto";
import "pluggableharness/agent/content/v1/content.proto";
import "pluggableharness/agent/model/v1/model.proto";
import "pluggableharness/agent/render/v1/render.proto";
import "pluggableharness/agent/slashcommand/v1/slashcommand.proto";

option go_package = "github.com/pluggableharness/agent/pkg/memory/proto/v1;memoryv1";

// MemoryService implements the memory provider protocol described in
// specifications/memory.md §2-11.
service MemoryService {
  // GetCapabilities reports what this provider supports before any other
  // RPC is issued. Unary. memory.md §3.
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);

  // Configure decodes this provider's agent.hcl config block, per the
  // same schema-to-cty bridge contract as the rest of this spec series
  // (model.md §3). Unary. memory.md §5.
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Recall is the read side: it fires at context-assemble time, competing
  // for the same token budget pool as context providers, and returns the
  // records this provider judges relevant. Unary. memory.md §6.
  rpc Recall(RecallRequest) returns (RecallResponse);

  // Record is the write side: it creates a new record. Unary. memory.md §7.
  rpc Record(RecordRequest) returns (RecordResponse);

  // UpdateRecord replaces an existing record's title/content wholesale
  // (not a patch). MUST fail with a structured MemoryError (memory.md §11)
  // if `id` doesn't match an existing record, rather than silently
  // no-op'ing. Unary. memory.md §7.
  rpc UpdateRecord(UpdateRecordRequest) returns (UpdateRecordResponse);

  // DeleteRecord removes an existing record. MUST fail with a structured
  // MemoryError (memory.md §11) if `id` doesn't match an existing record,
  // rather than silently no-op'ing. Unary. memory.md §7.
  rpc DeleteRecord(DeleteRecordRequest) returns (DeleteRecordResponse);

  // ApproveRecord transitions a record from PENDING to CANONICAL. MAY be
  // implemented; a provider declaring ratification_supported = true MUST
  // implement it. Unary. memory.md §8.
  rpc ApproveRecord(ApproveRecordRequest) returns (ApproveRecordResponse);

  // RejectRecord discards a pending draft entirely — not a soft delete.
  // MAY be implemented, under the same ratification_supported = true
  // requirement as ApproveRecord. Unary. memory.md §8.
  rpc RejectRecord(RejectRecordRequest) returns (RejectRecordResponse);

  // Render returns this provider's own RenderTree for its content (e.g. a
  // review-inbox view distinct from ordinary recall), in place of the
  // kernel's generic fallback. MAY be implemented. Unary. memory.md §10.
  rpc Render(RenderRequest) returns (RenderResponse);
}

// GetCapabilitiesRequest carries no fields; GetCapabilities takes no
// parameters beyond the plugin handshake already having occurred.
message GetCapabilitiesRequest {}

// MemoryType is the record taxonomy, fixed at the protocol level rather
// than provider-defined (memory.md §4). A record MUST declare exactly one
// MemoryType, and it is immutable after creation — recategorizing means
// DeleteRecord followed by a new Record call, not UpdateRecord.
enum MemoryType {
  // Zero value. Never valid for a real record; its presence on the wire
  // means a caller forgot to set the field.
  MEMORY_TYPE_UNSPECIFIED = 0;
  // The subject's role, goals, responsibilities, and knowledge. Tailors
  // future behavior to who they are and what they already know.
  MEMORY_TYPE_USER = 1;
  // Guidance on how to approach work, captured from both corrections
  // ("stop doing X") and confirmations ("yes, keep doing that") — both
  // directions matter equally.
  MEMORY_TYPE_FEEDBACK = 2;
  // Ongoing work, goals, decisions, and incidents not otherwise derivable
  // from code or git history. Decays faster than the other three types; a
  // provider SHOULD weight recency more heavily for this type.
  MEMORY_TYPE_PROJECT = 3;
  // Pointers to where information lives in external systems (an issue
  // tracker, a dashboard, a channel) — not the information itself.
  MEMORY_TYPE_REFERENCE = 4;
}

// MemoryScope is the visibility taxonomy a record declares, fixed at the
// protocol level (memory.md §4.1). Immutable per record once set, same as
// MemoryType.
enum MemoryScope {
  // Zero value. Never valid for a real record; its presence on the wire
  // means a caller forgot to set the field.
  MEMORY_SCOPE_UNSPECIFIED = 0;
  // Visible only within the session (and its descendants) that wrote it —
  // not recalled by unrelated future sessions, though still durably
  // logged to the state backend for audit.
  MEMORY_SCOPE_SESSION = 1;
  // Scoped to the current working directory/project, recalled by any
  // session operating in that project.
  MEMORY_SCOPE_PROJECT = 2;
  // Recalled across every project, mirroring a memory system that spans
  // all of a subject's work.
  MEMORY_SCOPE_GLOBAL = 3;
}

// RecordStatus distinguishes a fully-persisted record from one awaiting
// review under the optional ratification pattern (memory.md §8).
enum RecordStatus {
  // Zero value. Never valid for a real record; its presence on the wire
  // means a caller forgot to set the field.
  RECORD_STATUS_UNSPECIFIED = 0;
  // The record is part of what Recall normally surfaces.
  RECORD_STATUS_CANONICAL = 1;
  // The record is a drafted-but-not-yet-reviewed write. A provider with
  // ratification_supported == false MUST NEVER return this status
  // (memory.md §8).
  RECORD_STATUS_PENDING = 2;
}

// MemoryCapabilities is this provider's capability advertisement, returned
// by GetCapabilities. memory.md §3.
message MemoryCapabilities {
  // The default token budget this provider requests for its Recall
  // contributions, absent any override — same convention as context.md
  // §6's reserved token_budget config field. MUST be set.
  int64 default_token_budget = 1;

  // Which MemoryTypes this provider handles. MUST be set; MAY be a subset
  // of the full MemoryType enum.
  repeated MemoryType supported_types = 2;

  // Which MemoryScopes this provider handles. MUST be set; MAY be a
  // subset of the full MemoryScope enum (e.g. project-only).
  repeated MemoryScope supported_scopes = 3;

  // Whether this provider implements the ApproveRecord/RejectRecord
  // ratification pattern (memory.md §8). MUST be set; defaults to false.
  bool ratification_supported = 4;

  // Slash commands this provider contributes, per frontend.md §5. MAY be
  // empty — the reference tools (memory.md §9.2) already cover the common
  // remember/forget/search cases via the ordinary tool-provider path.
  repeated pluggableharness.agent.slashcommand.v1.SlashCommandSpec slash_commands = 5;

  // This provider's agent.hcl config schema, per configuration.md §4.
  pluggableharness.agent.config.v1.ConfigSchema config_schema = 6;
}

// GetCapabilitiesResponse wraps this provider's capability advertisement.
message GetCapabilitiesResponse {
  // This provider's capabilities.
  MemoryCapabilities capabilities = 1;
}

// ConfigureRequest wraps this provider's already-decoded agent.hcl config
// block. memory.md §5.
message ConfigureRequest {
  // The decoded config, per the schema this provider advertised in
  // MemoryCapabilities.config_schema (configuration.md §4). Already
  // decoded from HCL/cty by the kernel — this is a Struct because the
  // shape is genuinely provider-defined at the proto level (see
  // .claude/rules/proto.md's Struct carve-out), not because the value
  // itself is untyped.
  google.protobuf.Struct config = 1;
}

// ConfigureResponse is empty on success. Errors surface as a gRPC status
// carrying a MemoryError in its structured detail, per grpc.md — not an
// in-band field on this message.
message ConfigureResponse {}

// RecallRequest is the read-side query, issued at context-assemble time.
// memory.md §6.
message RecallRequest {
  // The requesting session's id.
  string session_id = 1;

  // The current turn number within that session.
  int64 turn_number = 2;

  // The token budget this Recall call MUST self-truncate its returned
  // records to. Competes for the same budget pool as context providers,
  // resolved the same way context.md §6 resolves a context provider's cap.
  int64 token_budget = 3;

  // The model this recall is being assembled for, mirroring context.md
  // §4's ContextRequest field. Lets a provider pass a precise model
  // reference into the CountTokens kernel callback (kernel-callbacks.md
  // §2) — added per kernel-callbacks.md §6's correction. MUST be set.
  pluggableharness.agent.model.v1.ModelTarget model_target = 4;

  // Paths of files touched so far this turn, mirroring context.md §4's
  // field of the same name. MAY be empty.
  repeated string files_touched = 5;

  // The session's current working directory.
  string working_directory = 6;

  // Restricts results to these MemoryTypes. MAY be empty, meaning all
  // types this provider supports.
  repeated MemoryType type_filter = 7;

  // Restricts results to these MemoryScopes. MAY be empty, meaning all
  // scopes this provider supports.
  repeated MemoryScope scope_filter = 8;

  // Whether PENDING-status records may be included in the response. MUST
  // default to false — a PENDING record MUST NOT surface through ordinary
  // recall unless this is true (memory.md §6, §8).
  bool include_pending = 9;
}

// RecallResponse carries the records this provider judges relevant to the
// requesting RecallRequest.
message RecallResponse {
  // The recalled records, in this provider's own relevance order.
  repeated MemoryRecord records = 1;
}

// MemoryRecord is one persisted unit of memory. memory.md §6.
message MemoryRecord {
  // A slug, unique within this provider. Kernel-enforced uniqueness per
  // memory.md §7.
  string id = 1;

  // This record's fixed taxonomy classification. Immutable after
  // creation.
  MemoryType type = 2;

  // This record's visibility scope. MUST be set; immutable after
  // creation, like `type`.
  MemoryScope scope = 3;

  // Human-readable title.
  string title = 4;

  // The record's content. Text-only in v1, same constraint as context.md
  // §4.
  repeated pluggableharness.agent.content.v1.ContentBlock content = 5;

  // This record's size, computed via the kernel's CountTokens callback
  // (kernel-callbacks.md §2), never a provider-local heuristic.
  int64 tokens = 6;

  // Whether this record is fully persisted or awaiting ratification.
  RecordStatus status = 7;

  // Record ids this record references. MUST be set — kernel-parsed from
  // "[[name]]" syntax in `content` at Record/UpdateRecord time
  // (memory.md §7.1), not provider-populated.
  repeated string links = 8;

  // When this record was first created.
  google.protobuf.Timestamp created_at = 9;

  // When this record was last modified.
  google.protobuf.Timestamp updated_at = 10;
}

// RecordRequest creates a new record. memory.md §7.
message RecordRequest {
  // This record's fixed taxonomy classification. MUST be set.
  MemoryType type = 1;

  // This record's visibility scope. MUST be set.
  MemoryScope scope = 2;

  // An author-suggested slug. MAY be omitted, in which case the provider
  // derives one from content; the kernel disambiguates collisions with a
  // numeric suffix (memory.md §7) rather than overwriting or rejecting.
  optional string id = 3;

  // Human-readable title.
  string title = 4;

  // The record's content.
  repeated pluggableharness.agent.content.v1.ContentBlock content = 5;
}

// RecordResult is the shared outcome shape for Record (via
// RecordResponse), UpdateRecord (via UpdateRecordResponse), and
// ApproveRecord (via ApproveRecordResponse) — a reusable domain type, not
// itself an RPC response type for more than one RPC.
message RecordResult {
  // The final assigned slug. MUST be set.
  string id = 1;

  // Whether the write is fully persisted or awaiting ratification.
  RecordStatus status = 2;
}

// RecordResponse wraps Record's outcome.
message RecordResponse {
  // The newly created record's outcome.
  RecordResult result = 1;
}

// UpdateRecordRequest replaces an existing record's title/content
// wholesale. memory.md §7.
message UpdateRecordRequest {
  // The existing record's id. MUST match an existing record, or the call
  // fails with a structured MemoryError.
  string id = 1;

  // The record's new title. Unset leaves the existing title unchanged.
  optional string title = 2;

  // The record's new content, replacing the existing content wholesale —
  // not a patch. MUST be set.
  repeated pluggableharness.agent.content.v1.ContentBlock content = 3;
}

// UpdateRecordResponse wraps UpdateRecord's outcome, which is the same
// shape as Record's (memory.md §7) but kept as its own per-RPC response
// type — RecordResult itself stays a reusable domain type, not an RPC
// response type shared across RPCs.
message UpdateRecordResponse {
  // The updated record's outcome.
  RecordResult result = 1;
}

// DeleteRecordRequest identifies the record to remove. memory.md §7.
message DeleteRecordRequest {
  // The existing record's id. MUST match an existing record, or the call
  // fails with a structured MemoryError.
  string id = 1;
}

// DeleteResult is the shared outcome shape for DeleteRecord (via
// DeleteRecordResponse) and RejectRecord (via RejectRecordResponse) — a
// reusable domain type, not itself an RPC response type for more than one
// RPC.
message DeleteResult {
  // True if a record was actually removed.
  bool deleted = 1;
}

// DeleteRecordResponse wraps DeleteRecord's outcome.
message DeleteRecordResponse {
  // Whether the record was actually removed.
  DeleteResult result = 1;
}

// ApproveRecordRequest identifies the pending record to transition to
// CANONICAL. memory.md §8.
message ApproveRecordRequest {
  // The pending record's id.
  string id = 1;
}

// ApproveRecordResponse wraps ApproveRecord's outcome, which is the same
// shape as Record's (memory.md §8) but kept as its own per-RPC response
// type — RecordResult itself stays a reusable domain type, not an RPC
// response type shared across RPCs.
message ApproveRecordResponse {
  // The now-canonical record's outcome.
  RecordResult result = 1;
}

// RejectRecordRequest identifies the pending record to discard entirely.
// memory.md §8.
message RejectRecordRequest {
  // The pending record's id.
  string id = 1;
}

// RejectRecordResponse wraps RejectRecord's outcome, which is the same
// shape as DeleteRecord's (memory.md §8) but kept as its own per-RPC
// response type — DeleteResult itself stays a reusable domain type, not an
// RPC response type shared across RPCs.
message RejectRecordResponse {
  // Whether the pending draft was actually discarded.
  DeleteResult result = 1;
}

// MemoryErrorCategory is the structured error taxonomy every MemoryError
// classifies into. memory.md §11.
enum MemoryErrorCategory {
  // Zero value. Never valid for a real error; its presence on the wire
  // means a caller forgot to set the field.
  MEMORY_ERROR_CATEGORY_UNSPECIFIED = 0;
  // UpdateRecord/DeleteRecord/ApproveRecord/RejectRecord referenced an id
  // that doesn't exist.
  MEMORY_ERROR_CATEGORY_NOT_FOUND = 1;
  // Record specified a MemoryType this provider doesn't support (absent
  // from GetCapabilities.supported_types).
  MEMORY_ERROR_CATEGORY_INVALID_TYPE = 2;
  // ApproveRecord/RejectRecord was called against a provider with
  // ratification_supported == false.
  MEMORY_ERROR_CATEGORY_RATIFICATION_UNSUPPORTED = 3;
  // Recall's candidate records exceed token_budget even after this
  // provider's own truncation — the same MUST-self-truncate principle as
  // context.md §6.
  MEMORY_ERROR_CATEGORY_BUDGET_EXCEEDED = 4;
  // This provider's backend storage was unreachable at call time.
  MEMORY_ERROR_CATEGORY_SOURCE_UNAVAILABLE = 5;
  // Any error not covered by a more specific category above.
  MEMORY_ERROR_CATEGORY_UNKNOWN = 6;
}

// MemoryError is the structured detail carried on a gRPC error status
// crossing the memory provider plugin boundary. memory.md §11.
message MemoryError {
  // Which category of failure occurred.
  MemoryErrorCategory category = 1;

  // Human-readable error detail.
  string message = 2;

  // Whether the kernel MAY retry this call as-is.
  bool retryable = 3;
}

// RenderRequest carries the opaque payload to render. memory.md §10.
message RenderRequest {
  // The opaque emitted payload to render — see grpc.md's Emit->Render->
  // Paint carve-out; this is the one field in this file that is
  // deliberately untyped bytes rather than a concrete message.
  bytes payload = 1;
}

// RenderResponse wraps this provider's rendered output. memory.md §10.
message RenderResponse {
  // The rendered tree, per frontend.md §1.
  pluggableharness.agent.render.v1.RenderTree tree = 1;
}
