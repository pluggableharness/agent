syntax = "proto3";

package pluggableharness.tool.v1;

import "google/protobuf/struct.proto";
import "pluggableharness/tool/v1/errors.proto";
import "pluggableharness/tool/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/tool/proto/v1;toolv1";

// Occurrence-shaped messages streamed by Invoke.

// InvokeResponse wraps one message in the stream Invoke returns. A thin
// per-RPC envelope around ToolEvent, which keeps its own rich structure
// independent of the RPC signature.
message InvokeResponse {
  // The event.
  ToolEvent event = 1;
}

// ToolEvent is one message in the stream Invoke returns, per tool.md §4.
// Exactly one of `result`/`error` closes the stream; `output_chunk`,
// `progress`, and `partial_result` MAY each appear zero or more times
// before it; `exit_status` MAY appear at most once. The relative order of
// `output_chunk` events MUST be preserved by the transport.
message ToolEvent {
  oneof event {
    // Incremental raw output from a process-backed operation.
    OutputChunk output_chunk = 1;

    // A human-readable progress update.
    Progress progress = 2;

    // Incremental structured output, e.g. search hits as they're found.
    PartialResult partial_result = 3;

    // The exit status of a process-backed operation's child process.
    ExitStatus exit_status = 4;

    // The terminal, successful result of this call.
    ToolResult result = 5;

    // The terminal, failed result of this call.
    ToolError error = 6;
  }

  // OutputChunk carries one slice of raw stdout/stderr-shaped output from a
  // process-backed operation.
  message OutputChunk {
    // Which stream this chunk came from.
    OutputStream stream = 1;

    // The chunk's raw bytes.
    bytes data = 2;
  }

  // Progress carries a human-readable status update for a long-running
  // call.
  message Progress {
    // A human-readable description of the current step.
    string message = 1;

    // How far through the operation this call is, in [0.0, 1.0]. Absent
    // means the provider cannot estimate completion fraction.
    optional double fraction_complete = 2;
  }

  // PartialResult carries incremental structured output before the
  // terminal result, e.g. search hits as they're found.
  message PartialResult {
    // The incremental structured payload.
    google.protobuf.Struct payload = 1;
  }

  // ExitStatus carries a process-backed operation's child process exit
  // information. exec-family tools only — a provider for a non-process-
  // backed tool (file read, grep, web fetch) MUST NOT emit this. Appears
  // at most once per Invoke stream.
  message ExitStatus {
    // The child process's exit code.
    int32 exit_code = 1;

    // The signal that terminated the child process, if any. Absent means
    // the process exited normally (exit_code is meaningful on its own).
    optional string signal = 2;
  }
}

// OutputStream distinguishes which underlying stream an OutputChunk came
// from.
enum OutputStream {
  // Zero value. Never valid for a real chunk; its presence on the wire
  // means a caller forgot to set the field.
  OUTPUT_STREAM_UNSPECIFIED = 0;

  // Standard output.
  OUTPUT_STREAM_STDOUT = 1;

  // Standard error.
  OUTPUT_STREAM_STDERR = 2;
}
