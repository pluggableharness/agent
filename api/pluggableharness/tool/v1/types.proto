syntax = "proto3";

package pluggableharness.tool.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "pluggableharness/common/v1/types.proto";
import "pluggableharness/schema/v1/types.proto";

option go_package = "github.com/pluggableharness/agent/pkg/tool/proto/v1;toolv1";

// Domain types for the tool provider protocol.

// ToolKind is the axis that drives the plan/apply gate, per tool.md §2.
// Deliberately separate from RiskClass: kind is the binary the gate
// mechanically needs, risk is a finer-grained classification within it.
enum ToolKind {
  // Zero value. Never valid for a real operation; its presence on the wire
  // means a caller forgot to set the field.
  TOOL_KIND_UNSPECIFIED = 0;

  // Mutating. Gated behind the plan/apply approval gate.
  TOOL_KIND_RESOURCE = 1;

  // Read-only. Executes freely, subject only to the policy precheck
  // (agent-loop.md §5.4).
  TOOL_KIND_DATA_SOURCE = 2;

  // Blocks the current turn for human input, per tool.md §2.1. Produces no
  // state mutation of its own — the human's answer becomes the result.
  TOOL_KIND_INTERACTIVE = 3;
}

// RiskClass classifies an operation's blast radius, per tool.md §2. Orthogonal
// to ToolKind: kind determines whether the plan/apply gate applies at all,
// risk determines how significant the gated (or inherently ungated) action is.
enum RiskClass {
  // Zero value. Never valid for a real operation; its presence on the wire
  // means a caller forgot to set the field.
  RISK_CLASS_UNSPECIFIED = 0;

  // Inherently unable to mutate anything the plugin controls. MUST be used
  // for TOOL_KIND_DATA_SOURCE and TOOL_KIND_INTERACTIVE alike — neither
  // mutates nor reads anything external, so neither has a blast radius to
  // classify.
  RISK_CLASS_READ_ONLY = 1;

  // A resource operation with narrow, easily-reversible blast radius, e.g.
  // a write to a scratch path.
  RISK_CLASS_LOW = 2;

  // A resource operation with real but bounded blast radius, e.g. editing
  // a tracked source file.
  RISK_CLASS_MODERATE = 3;

  // A resource operation with broad or hard-to-predict blast radius, e.g.
  // arbitrary shell execution.
  RISK_CLASS_HIGH = 4;

  // A resource operation capable of irreversible or wide-blast-radius
  // action, e.g. `rm -rf`, a force-push, or spawning a sub-agent with
  // further unattended write access.
  //
  // A TOOL_KIND_RESOURCE operation MUST declare one of LOW/MODERATE/HIGH/
  // CRITICAL — never READ_ONLY. There is no resource with read_only risk.
  RISK_CLASS_CRITICAL = 5;
}

// ConcurrencySpec declares whether this operation's Invoke calls may run
// concurrently against the same provider process, per tool.md §5.
message ConcurrencySpec {
  // MUST be set, per operation, except for TOOL_KIND_INTERACTIVE. false (or
  // an absent/unset default) means the kernel MUST NOT run any other Invoke
  // call against this provider process concurrently with this one — a
  // coarse, provider-wide lock. true means concurrent Invoke calls against
  // this provider are generally safe. A provider that does not populate
  // this field at all MUST be treated by the kernel as false — the
  // conservative default.
  bool safe = 1;

  // Only meaningful when safe == true. Names of this operation's
  // input_schema fields whose value(s) form a serialization key. The
  // kernel computes key = (provider_name, tool_name, value(key_fields)) and
  // MUST serialize calls sharing an identical key, while still freely
  // parallelizing calls with distinct keys. Omitting key_fields under
  // safe == true asserts that no two calls to this operation can ever
  // conflict — a strong claim, true for e.g. web_search, false for e.g.
  // write_file.
  repeated string key_fields = 2;

  // MUST NOT be declared for TOOL_KIND_INTERACTIVE — the kernel ignores it
  // if present and always enforces strictly sequential execution for
  // interactive calls, regardless of any declared value here (tool.md
  // §2.1).
}

// ToolSchema declares one operation this provider exposes, per tool.md §2.
message ToolSchema {
  // MUST — unique within this provider's namespace, e.g. "read_file".
  string name = 1;

  // MUST — drives the plan/apply gate.
  ToolKind kind = 2;

  // MUST — see RiskClass.
  RiskClass risk = 3;

  // MUST — shown to the model for tool selection and in plan diffs.
  string description = 4;

  // MUST — the common JSON-Schema subset per model.md §6, describing the
  // shape of ToolCall.arguments for this operation.
  pluggableharness.schema.v1.Schema input_schema = 5;

  // MUST — the common JSON-Schema subset per model.md §6, describing the
  // shape of ToolResult.payload for this operation.
  pluggableharness.schema.v1.Schema output_schema = 6;

  // MUST — true if Invoke may emit intermediate ToolEvents (output_chunk,
  // progress, partial_result) before the terminal event; false if Invoke
  // always emits exactly one terminal event with no lead-up.
  bool streaming = 7;

  // MUST, except MUST NOT be meaningfully set for TOOL_KIND_INTERACTIVE.
  ConcurrencySpec concurrency = 8;

  // SHOULD — the deadline the kernel applies to Invoke for this operation
  // absent an agent.hcl override. Absent means the kernel's global default
  // applies instead (configuration/settings-and-global.md).
  optional google.protobuf.Duration default_timeout = 9;

  // True iff re-running this operation with identical arguments cannot
  // produce a different end state than running it once. Gates whether the
  // kernel MAY auto-retry a retryable ToolError for a TOOL_KIND_RESOURCE
  // operation — see conformance.md#error-taxonomy's retry interaction.
  // TOOL_KIND_DATA_SOURCE operations are implicitly safe to retry
  // regardless of this field.
  bool idempotent = 10;
}

// ToolCall is one request to execute an operation, per tool.md §4.
message ToolCall {
  // MUST — kernel-assigned. Echoed in every ToolEvent for this call, for
  // correlation.
  string id = 1;

  // MUST — matches a ToolSchema.name from this provider's GetSchema
  // response.
  string tool_name = 2;

  // MUST — already-parsed JSON conforming to that ToolSchema's
  // input_schema.
  google.protobuf.Struct arguments = 3;

  // MUST be set by the kernel. Carries the session_id/turn_id this call
  // executes for — what the plugin echoes back on its own
  // KernelCallbackService.Emit/Log calls for attribution — and the
  // session's working_directory, which any process-backed operation
  // (the reference catalog's exec.bash, read_file, and similar) MUST
  // resolve relative-path arguments against. See
  // pluggableharness.common.v1.CallContext.
  pluggableharness.common.v1.CallContext call_context = 4;
}

// ToolResult is the terminal, successful outcome of an Invoke call.
message ToolResult {
  // MUST conform to the ToolSchema.output_schema declared for this call's
  // tool_name; the kernel strictly validates this — a non-conforming
  // payload becomes a ToolError with category TOOL_ERROR_CATEGORY_UNKNOWN
  // rather than being passed through to history.
  google.protobuf.Struct payload = 1;
}
