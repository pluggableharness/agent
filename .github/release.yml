# Categories for GitHub's auto-generated release notes (the "Generate release
# notes" button / API). GoReleaser owns the commit-level changelog in release
# artifacts; this shapes the PR-level notes on the Releases page.
changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 💥 Breaking changes
      labels:
        - breaking-change
    - title: 📜 Protocol & spec
      labels:
        - spec
        - provider-proposal
    - title: ✨ Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug fixes
      labels:
        - bug
    - title: 🔒 Security
      labels:
        - security
    - title: 📦 Dependencies
      labels:
        - dependencies
    - title: 🧹 Everything else
      labels:
        - "*"
