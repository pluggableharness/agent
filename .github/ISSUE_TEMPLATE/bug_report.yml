name: Bug report
description: Something is broken — a crash, wrong behavior, or a spec/implementation mismatch.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. If this is a security boundary issue (policy-gate bypass, secret leakage, supply-chain integrity), **stop** — use [private vulnerability reporting](https://github.com/pluggableharness/agent/security/advisories/new) instead, per SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? Include exact error output where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: If the expected behavior comes from a spec document, link the section (path + heading anchor).
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps from a clean state. The smaller the reproduction, the faster the fix.
      placeholder: |
        1. Write the agent.hcl below
        2. Run `agent run`
        3. ...
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: agent.hcl (redacted)
      description: The relevant config, with secrets removed. `env()` references are fine to leave in.
      render: hcl
  - type: input
    id: version
    attributes:
      label: Version
      description: Release version or commit SHA.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: e.g. Fedora 44 x86_64, macOS 15 arm64, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant session or plugin logs. Check for secrets before pasting.
      render: text
