version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - govet
    - misspell
    - nilerr
    - noctx
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - wastedassign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/pluggableharness/agent

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
