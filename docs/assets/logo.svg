<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="PluggableHarness Agent">
  <!-- kernel: outer hexagon, mid-graphite so it reads on both the dark header and a light browser tab -->
  <path d="M12 2.4 20.3 7.2 V16.8 L12 21.6 3.7 16.8 V7.2 Z" fill="none" stroke="#9aa0aa" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- pin: red connector plugging in from the left -->
  <path d="M6.4 12 H10.6" fill="none" stroke="#c62828" stroke-width="1.9" stroke-linecap="round"/>
  <!-- plug: blue socket hexagon, offset toward the right wall -->
  <path d="M14.6 8.5 17.6 10.25 V13.75 L14.6 15.5 11.6 13.75 V10.25 Z" fill="#2458c5"/>
  <!-- socket hole: white center -->
  <circle cx="14.6" cy="12" r="1.05" fill="#fafaf9"/>
</svg>
